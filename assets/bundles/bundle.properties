block.meld2-sunder.name = Sunder
block.meld2-sunder.description = Fires clumps of Debris flak at enemy targets.\n[accent]Sticks shrapnel in targets![]
block.meld2-sunder.details = Animated by a ball of [meld2-aether]Aether[]; I'd joke about not scaring the lil goober but it doesn't have any feelings.

block.meld2-shredstorm.name = Shredstorm
block.meld2-shredstorm.description = Sprays debris shrapnel or silver buckshot at enemy targets.\n[accent]Spread is focused towards the aim direction.
block.meld2-shredstorm.details = Sunder's cousin.

block.meld2-flurry.name = Flurry
block.meld2-flurry.description = Charges and flings canisters of sticky Carbolith dust which spark on a delay.\n[accent]High damage vs force projectors[]\n\n[red]Warning: Putting hard matterials with sludge in will clog the machinery![]\n\n[accent]Armored![]

block.meld2-molotov.name = Molotov
block.meld2-molotov.description = Launches an [#cbdbfc]Aspect[]-filled Silver shell at ground targets over long distances, blasting shrapnel out of targets for extra damage. \n[accent]High armor piercing damage on impact.\nDoubles the damage armoured units take![]

block.meld2-grandeur.name = Grandeur
block.meld2-grandeur.description = Flings a compacted ball of material at targets. over long distances \n[accent]Small amounts of armor piercing on hit\n\nEffects vary based on ammo type[]

block.meld2-downpour.name = Downpour
block.meld2-downpour.description = Barages ground targets with 30 [#89828c]Mercury[]-filled Silver thorns each burst. Slow reload speed. \n[accent]High burst damage and armor piercing. Inflicts Mercury Poisoning![]

block.meld2-vivalo.name = Vivalo
block.meld2-vivalo.description = Atomizes and fires a jet of crystalline particles which pierce armor. [accent]\n\nQuick rotation speed and increased coolant effectiveness.\n\nEffects vary based on ammo type, ranging from Laceration to Shattering[] 
block.meld2-vivalo.details = This design was cut down to be as light as possible to be quickly constructed and deployed. Crystals would be crushed in the base, stored in the drum for quick feeding and then be accelerated. The drum was placed on the opposite side of the accelerator to shift the center of mass towards the middle, enabling quick turning. The design's fragility was easily compensated for with walls from its front, but sustained fire would quickly destroy it.

block.meld2-vinca.name = Vinca
block.meld2-vinca.description = Sprays down targets with high pressured armor piercing crystalline particulate suspended in [#cbdbfc]Aspect[].\n[accent]Sticks shrapnel in targets![]

block.meld2-vivisection.name = Vivisection
block.meld2-vivisection.description = Assembles and launches [#4bb66b]Resonarum[] sawblades.\n[accent]Lacerates targets without armor[]

block.meld2-tantrum.name = Tantrum
block.meld2-tantrum.description = Compacts and puffs out clouds of [#8872da]Rift[] using a Silver piston, dealing heavy knockback.\n[accent]Reduces target's drag[]

block.meld2-earthbound-infuser.name = Earthbound Infuser
block.meld2-earthbound-infuser.description = Infuses Debris with vent fumes to synthesize Carbolith.\n\nRequires [#cbdbfc]Aspect[] to run, can siphon [#5b4739]Fumes[] from vents.

block.meld2-gas-kiln.name = Gas-fired Kiln
block.meld2-gas-kiln.description = Heats materials using [#cbdbfc]Aspect[], often used for [red]primitive[] refinement processes like smelting or ceramic blasting.\n\n[accent]Carbolith + Tenbris -> Shadesteel + [#5b4739]Fumes[]\nSilver -> Annealed Silver\n\nClay-Mallows + Quartz Strata + Likestone Sediments -> Glassy-Mallows\n\nClay-Mallows + Likestone Sediments + Debris -> Crucible-Plating\nDebris + Shadesteel -> Crucible Platings


block.meld2-rotary-kiln.name = Rotary Kiln
block.meld2-rotary-kiln.description = Burns mass amounts of [#cbdbfc]Aspect[] as fuel, heats materials to process them in bulk.\n\n[accent]Carbolith + Tenbris -> Shadesteel + [#5b4739]Fumes[]\nSilver -> Annealed Silver\n\nClay-Mallows + Quartz Strata + Likestone Sediments -> Glassy-Mallows\n\nClay-Mallows + Likestone Sediments + Debris -> Crucible-Plating\nDebris + Shadesteel -> Crucible Platings

block.meld2-pneumatic-extruder.name = Pneumatic Extruder
block.meld2-pneumatic-extruder.description = Extrudes material into pipes and capsules, uses [#cbdbfc]Aspect[] to run. [accent]\n\nDebris + Elnar -> Aspect Pipe\n\nSilver/Annealed Silver + Debris -> Aspect Pipe\n\nGlassy-Mallows + Silver/Annealed Silver + Storming Aspect -> [red]Aspect Bombs[]

block.meld2-storm-iris.name = Storm Iris
block.meld2-storm-iris.description = Converts stable [meld2-aether]Aether[] into charged [meld2-thundering-aether]Thundering Aether[]
block.meld2-storm-iris.details = The storm is here.\n\n[red]PANIC[]\n\nTides washed upon the Bassalt Groves, but it would not falter.\n\nHeavy rains of biomass and crystals peltered the roofs of the facility, but it would not falter.\n\nThen came the void...\n\nThe flooding was never preventable, it was inevitable.\n\nBasalt groves filled with light.\nForgotten and entombed yet in the night...

block.meld2-heating-basin.name = Heating Basin
block.meld2-heating-basin.description =  Runs [#b89f47]Nectar[] through pipes laced with Carbolith dust over geothermal sources to extract [#89828c]Mercury[], producing loads of Debris as a byproduct.

block.meld2-peat-masher.name = Peat Masher
block.meld2-peat-masher.description = Grinds up Compacted Masses extracting Bramble Vines and Starving Masses in the process.\n\nRequires [#cbdbfc]Aspect[] and [#89828c]Mercury[] to run. Acts as a fluid router for [#89828c]Mercury[] and [#cbdbfc]Aspect[].\n\n[accent]Becomes net positive on [#89828c]Mercury[] when operated over geothermal sources[]

block.meld2-bramble-press.name = Bramble Press
block.meld2-bramble-press.description = Presses Bramble vines for [#89828c]Mercury[], producing tiny amounts of [#89413e]Ooze[]. Acts as a fluid router for [#89828c]Mercury[]\n\n[accent]Plated[]

block.meld2-electrum-amalgamator.name = Electrum Amalgamator
block.meld2-electrum-amalgamator.description = Directly blasts native gold deposits with [#cbdbfc]Aspect[], using [#89828c]Mercury[] to extract an amalgam from the powder, then combines the mush with Silver and Debris to create Electrum.\n\nProduces some [#e6c700]Ichor[] as a byproduct.\n\n[accent]Input liquid requirements based on efficiency.
block.meld2-electrum-amalgamator.details = An alternative to mining Electrum off the walls. Though not very efficient,  itt'll have to do.

block.meld2-amalgam-decomposer.name = Amalgam Decomposer
block.meld2-amalgam-decomposer.description = Grinds Electrum down and blasts it using high amounts of [#cbdbfc]Aspect[] till the remainder is pieces of Debris and [#e6c700]Ichor[].
block.meld2-amalgam-decomposer.details = Doesn't it look happier?\nI guess so, but what's that to the right?\nWeren't you told? That's a dissonitre crystal.\n...Isn't that what they powder up at the-\n[red]<RECORDING CUT>[]

block.meld2-dissonance-inducer.name = Dissonance Inducer
block.meld2-dissonance-inducer.description = Mimics a sedentary Dissonitre incubation environment for [#ea9ad6]Meld[], growing batches of crystals, and offgassing some [#cb8650]Aether[] in the process.\n\nRequires Resonarum and [#8872da]Rift[] to run.

block.meld2-warp-aggregator.name = Warp Aggregator
block.meld2-warp-aggregator.description = Processes massive batches of glass waste over [accent]heat sources[] producing [#b460e2]Warp[].\n\nReturns noteable amounts of useful glass materials.
block.meld2-warp-aggregator.details = ...it's a box.\n\na box which crafts\n\na crate?\n\nwell I suppose it's quite the crafty crate...

block.meld2-glassblower.name = Glassblower
block.meld2-glassblower.description = Melts down globules and extrudes them into a fine crystalline cloth, releasing [#cb8650]Aether[] in the process.\n\nRequires Riplom and power to run.\n\n[accent]Input liquid requirements based on efficiency.[]

block.meld2-vitric-weaver.name = Vitric Weaver
block.meld2-vitric-weaver.description = Weaves Dissonitre into a fine crystalline cloth.\n\nUntangles [#8872da]Rift[] input into [#cb8650]Aether[] in the process, requiring Riplom to run.\n\n[accent]Input liquid requirements based on efficiency.[]

block.meld2-brick-conglomerator.name = Conglomeration Rig
block.meld2-brick-conglomerator.description = Crushes up Carbolith and mixes it with vent fumes and [#e6c700]Ichor[], then presses the slurry into Bricks. Requires [#cbdbfc]Aspect[] to run.

block.meld2-silver-husk.name = Silver Husk
block.meld2-silver-husk.description = Buildable, [accent]insulated[] protection. Slowly regenerates when fed [#cbdbfc]Aspect[].\n\n[accent]Plated[]

block.meld2-shadesteel-shingles.name = Shadesteel Shingles
block.meld2-shadesteel-shingles.description = Mundane and bulky.
block.meld2-shadesteel-shingles.details = Brick of Shadesteel bricks of Shadesteel ingots.

block.meld2-gate-spike.name = Gate Spike
block.meld2-gate-spike.description = Acts as a door. Causes all connected doors to enabling or disable when toggled.

block.meld2-lake-rim.name = Lake Rim
block.meld2-lake-rim.description = Acts as a door, only placeable on the shoreline.

block.meld2-barricade.name = Barricade
block.meld2-barricade.description = Provides cover against enemy projectiles.\nQuick to build.\n\nEasy way to store Compacted Bricks/Stony Gloop outside of the core for onsite use.\n\n[accent]Armored.[]

block.meld2-sandbank.name = Sandbank
block.meld2-sandbank.description = Provides cover against enemy projectiles.\nSoaks a lot of damage, but takes extra damage each hit.\n\n[red]Squishi! (45)[]
block.meld2-sandbank.details = If pink sludge can build walls out of clay, why can't we!\nBecause... I see your point

block.meld2-nullifier.name = [red]Nullifier
block.meld2-nullifier.description = Constructs a devistating [#cbdbfc]Aspect[]-filled paylod that [red]decimates[] hostile buildings and units alike.\n\n[red]Annihilates its immediate surroundings on destruction, don't get too close![]

block.meld2-sonar-spire.name = Sonar Spire
block.meld2-sonar-spire.description = Provides vission and [accent]Rallies[] nearby units.
block.meld2-sonar-spire.details = Initially an aether flarestack build to help travelers find their way, morphed into an important building to rally biological and mechanical troops alike.


block.meld2-movement-anchor.name = Movement Anchor
block.meld2-movement-anchor.description = Targets and [accent]Anchor[]s enemy units.

block.meld2-gauze.name = Gauze
block.meld2-gauze.description = Weaves a [accent]Resonarum[] thread using [#5b4739]Fumes[], automatically applying it to connected blocks.

block.meld2-bruisekit.name = Bruisekit
block.meld2-bruisekit.description = Regenerates target block's health.\n\nPrioritises large, functional blocks and works at half speed on 1x1s.\n\nHeals up to 4x more health based on how low target health% is, down to 50%.

block.meld2-lamp-psi.name = Lamp Psi
block.meld2-lamp-psi.description = WHAT DO YOU MEAN IT'S CALLED A LAMP PSI, WASN'T "I AM PSI" CONFUSING ENOUGH\n\n[gray]yeah, duh, it's a cruel joke\n\ngod, the engineering team is so st-\n\ngal, don't get yourself exported to colony's reach\n\nI hate this fucking job[]\n\nA wall made from Iampsi... "becomes radiant" when given As-\n[gray]ok fuck this im not doing it anymore, get me out of *wheezing*\n\n<thud>\n[red]<RECORDING CUT>[]
block.meld2-lamp-psi.details = God is dead.

block.meld2-mercurial-diffuser.name = Mercurial Diffuser
block.meld2-mercurial-diffuser.description = Puffs clouds which intoxicate [#ea9ad6]Meld[] units. Applies a coating of [#89828c]Mercury[] to allied units. 

block.meld2-ping-tower.name = Ping Tower
block.meld2-ping-tower.description = uses debris pieces to fire a burst of snoar pings which highlight enemies hit through fog.\n\nRequires a large amount of [#cbdbfc]Aspect[] to run, getting quicker corosponding to the supply.
block.meld2-ping-tower.details = Whilst unable to rally allies, it helped give vital information on the [#ea9ad6]Meld[]'s whereabouts. Finding openings in an attack wave may prove vital to the survival of a task force.

block.meld2-overseer-fabricator.name = Overseer Fabricator
block.meld2-overseer-fabricator.description = Uses debris pieces to passively fabricate limited-duration [accent]Overseers[] to assist in nearby construction and [accent]Rally[] nearby allies.\n\nRequires a large amount of [#cbdbfc]Aspect[] to run, getting quicker corosponding to the supply.
block.meld2-overseer-fabricator.details = An older model of the sonar spire.\nThough low, the debris upkeep ended up being too restrictive for certain locations, so a new building was developed to help unshroud areas of importance.

block.meld2-fluid-sprayer.name = Fluid Sprayer
block.meld2-fluid-sprayer.description = Continually charges up and fires a burst of pellets that spread liquid as they travel.\n[accent]Only functions above 75% pressure![]

block.meld2-environmental-drencher.name = Environmental Drencher
block.meld2-environmental-drencher.description = Continually charges up and fires a ring of pellets that spread liquid as they travel.\n[accent]Only functions above 83% pressure![]

block.meld2-chute.name = Chute
block.meld2-chute.description = Transports items fowards. Only holds a single item.

block.meld2-plated-chute.name = Plated Chute
block.meld2-plated-chute.description = Transports items fowards, blocks items from non-distrib blocks at the sides. Only holds a single item.\n\n[accent]Plated[]

block.meld2-glasswork-chute.name = Glasswork Chute
block.meld2-glasswork-chute.description = Forms, then transports batches of items. Conducts power like a wire, double in speed while fed.
block.meld2-glasswork-chute.details = You wanted a better chute? You've got one now.\n<Disclaimer: No bridges included>

block.meld2-chute-router.name = Chute Router
block.meld2-chute-router.description = Routes items to three sides. Only accepts items from the back. Can be configured as a sorter.

block.meld2-chute-crossing.name = Chute Crossing
block.meld2-chute-crossing.description = Lets items cross through without intersecting with eachother.

block.meld2-chute-overflow.name = Chute Overflow
block.meld2-chute-overflow.description = Routes items to the front, or to the sides if blocked. \n\nAccepts items from the back, or the sides if empty.

block.meld2-chute-bridge.name = Chute Bridge
block.meld2-chute-bridge.description = Moves items over a single tile. Bypasses structures and terrain.

block.meld2-chute-unloader.name = Chute Unloader
block.meld2-chute-unloader.description = Unloads selected item out of adjacent blocks.\n[accent]Works on cores![]

block.meld2-unloading-hub.name = Unloading Hub
block.meld2-unloading-hub.description = Rapidly unloads the selected item out of adjacent blocks.\n[accent]Heavly Armored![]\n\n[]Works on cores![]\n\n[red]Damages all neary buildings on destruction![]
block.meld2-unloading-hub.details = This will cost [#cbdbfc]Aspect[] to run in the java port, hehehe~

block.meld2-channel-face.name = Channel Face
block.meld2-channel-face.description = Acts as a fluid junction. Transmits fluid without storing it. No risk of explosion.

block.meld2-channel-node.name = Channel Node
block.meld2-channel-node.description = Acts as a fluid router. Fluids can be input or output from any side. Stores a small amount of fluid.

block.meld2-aspect-outlet.name = Aspect Outlet
block.meld2-aspect-outlet.description = Decompresses [#cb8650]Aether[] into highly volatile [#cbdbfc]Aspect[] at a ratio of 1:10.\n\nWorks as an output terminal for a fluid network.

block.meld2-aspect-channel.name = Aspect Channel
block.meld2-aspect-channel.description = Acts as a directional router.\n\nWhen transporting [#cb8650]Aether[], fills nearby buildings with highly volatile [#cbdbfc]Aspect[].\n\nWorks as an insulated input/output terminal for a fluid network.\n\n[accent]Plated![]

block.meld2-aspect-bomb.name = Aspect Bomb
block.meld2-aspect-bomb.description = Have you ever tried using a channel director on a node full of aspect? Like Yeah, that's a standardised building now.\n\n[gray]Who thought shoving a bunch of explosive capsules in a pipe would be so effective...
block.meld2-aspect-bomb.details = Apparently like the annealed silver and glass for like the channels comes from the bombs themselves, isn't that crazy?

block.meld2-pressure-vent.name = Pressure Vent
block.meld2-pressure-vent.description = Acts as a fluid router. Releases stored vapor into the atmosphere.

block.meld2-manual-valve.name = Manual Valve
block.meld2-manual-valve.description = Acts as a fluid junction. Can be toggled to control if fluids can pass through.

block.meld2-intake-valve.name = Intake Valve
block.meld2-intake-valve.description = Acts as a fluid junction. Can be toggled to control if fluids can pass through.\n\n[accent]Can compact/de-compact incoming sources of fluids into the channel network.[]\n\n[accent]Plated![]
block.meld2-intake-valve.details = Yes, it works.

block.meld2-valve-controller.name = Valve Controller
block.meld2-valve-controller.description = Acts as a fluid junction. Enables the targeted block when surrounded by blocks with fluids over its threshold.\n\nThreshold/State can be configured.
block.meld2-valve-controller.details = Scidustry players, Ikaru is calling YOU.

block.meld2-channel-director.name = Channel Director
block.meld2-channel-director.description = When used with other fluid blocks, [red]restricts[] the flow of fluids to one direction only.

block.meld2-pipebox.name = Pipebox
block.meld2-pipebox.description = Routes fluids to the sides.\n\nCan be toggled to rotate the connections.

block.meld2-channel-director-pressurized.name = Pressurized Channel Director
block.meld2-channel-director-pressurized.description = Acts as a conduit. Transmits fluid from one side to the other. Stores a tiny amount of fluid.\n[accent]Transports at 200% pressure.[]\n\n[red]Will chain destruct![]

block.meld2-blossoming-channel.name = Blossoming Channel
block.meld2-blossoming-channel.description = Acts as a conduit. Transmits fluid from one side to the other. Stores a small amount of fluid.\n[accent]Transports at 500% pressure.[]\n\n[red]Will chain destruct![]

block.meld2-compartmentalized-node.name = Compartmentalized Node
block.meld2-compartmentalized-node.description = Acts as a fluid router. Liquid can be input or output from any side.\n\nSeparately stores [#b89f47]Nectar[], [#89828c]Mercury[], [#7d312f]Blood[] and [#89413e]Ooze[]. When supplied Debris while full with all four fluids, slowly voids its contents.
block.meld2-compartmentalized-node.details = Yes, it's dumb that the name goes one character off the UI frag. I'm triggered by this too.

block.meld2-channel-hub.name = Channel Hub
block.meld2-channel-hub.description = Acts as a fluid router. Liquid can be input or output from any side.\n\nStores 100 nodes worth of fluid.\n\n[accent]Plated![]

block.meld2-filtration-unit.name = Filtration Unit
block.meld2-filtration-unit.description = Acts as a filter. Outputs [#89828c]Mercury[] to any side.\n\nWhen powered with [#cbdbfc]Aspect[] while containing [#89828c]Mercury[], filters out Debris and Starving masses from [#7d312f]Blood[] and [#b89f47]Nectar[], producing some [#89828c]Mercury[] in the process.\n\n[accent]Halts when fully pressurized with [#89828c]Mercury[]![]

block.meld2-neutralization-chamber.name = Neutralization Chamber
block.meld2-neutralization-chamber.description = Uses [#89828c]Mercury[] and Elderflesh to soak up [#7d312f]Blood[], producing miniscule amounts of power in the process.\nActs as a fluid router for [#7d312f]Blood[].\n\n[scarlet]Explodes when fully pressurized with [#7d312f]Blood[]![]

block.meld2-conductive-pile.name = Conductive Pile
block.meld2-conductive-pile.description = It's a pile of electrum coils which is conductive. Go figure what you can use this for.\n\n[accent]And I guess it stores a tiny bit of power[]\n\n[red]...Squishi? (80)[]

block.meld2-connector.name = Connector
block.meld2-connector.description = Projects lasers which share power between the node and its target.\n\n[accent]Plated[]

block.meld2-substation.name = Substation
block.meld2-substation.description = Projects lasers which share power between the station and its target. Stores power in an internal buffer.\n\n[accent]Plated![]

block.meld2-powerbank.name = Powerbank
block.meld2-powerbank.description = Stores large amounts of power and releases it in times of defict.
block.meld2-powerbank.details = Accumulates [#cb8650]Aether[] from the atmosphere as Dissonitre is stimulated, and burns it off as [#cbdbfc]Aspect[] when power runs dry.\n\nThere must be some structure which generates power directly from [#cbdbfc]Aspect[]...

block.meld2-glass-burner.name = Glass Burner [red](PS)
block.meld2-glass-burner.description = Burns Dissonitre based material with bits of Riplom stabalized with [#8872da]Rift[], producing minute amounts of power.\n\n[red]Paceholder sprite![]

block.meld2-dissonance-discharger.name = Discharge Outlet [red](PS)
block.meld2-dissonance-discharger.description = Crushes Dissonitre and focuses the resulting Aether into [#cbdbfc]Aspect[] efficiently using resonarum lenses, producing some power in the process.\n\n[scarlet]Explodes when fully pressurized with [#cbdbfc]Aspect[]![]\n\n[red]Placeholder Sprite![]


block.sludge-decomposer.name = Sludge Decomposer
block.sludge-decomposer.description = Decomposes [#e6c700]Ichor[] and [#89413e]Ooze[], generating power and [#cbdbfc]Aspect[].
block.sludge-decomposer.

block.meld2-purification-chamber.name = Purification Chamber
block.meld2-purification-chamber.description = Blasts Starving Masses over high heat decomposing them into [#7d312f]Blood[], producing some power in the proceess.\n\nRequires [#89828c]Mercury[] and [#cbdbfc]Aspect[] to run.\n\n[scarlet]Explodes when fully pressurized with [#7d312f]Blood[]![]

block.meld2-thermo-matting.name = Thermo matting [red](PS)[]
block.meld2-thermo-matting.description = Passively obtains power from meld digestion over [#e6c700]Ichor[] sources, extracting some [#e6c700]Ichor[] in the process.\n\n[red]PLACEHOLDER SPRITE[]
block.meld2-thermo-matting.details = ...appears to be little to no waste left behind.

//Production
block.meld2-aether-accumulator.name = Aether Accumulator
block.meld2-aether-accumulator.description = Collects [#cb8650]Aether[] from suitable sources.

block.meld2-fumehood.name = Fumehood
block.meld2-fumehood.description = Placed over sources of aspects or gasses.

block.meld2-crystal-cracker.name = Crystal Cracker
block.meld2-crystal-cracker.description = Breaks open Dissonitre crystals over [accent]aspect soil[] as a source of [meld2-thundering-aether]Thundering Aether[].\n\nActs as a liquid router for its output between adjacent blocks.
block.meld2-crystal-cracker.details = ...mandatory "..." entry added in post recording in transcript

block.meld2-crush-weaver.name = Crush Weaver
block.meld2-crush-weaver.description = "Efficiently" weaves Dissonitre into Vitric Mesh over [accent]aspect soil[]. Requires [#cbdbfc]Aspect[] to run.
block.meld2-crush-weaver.details = ...your guess as to how this building works is as good as mine

block.meld2-aspect-discharger.name = Aspect Discharger
block.meld2-aspect-discharger.description = Converts [#cbdbfc]Aspect[]s to [accent]power[] over [accent]aspect soil[].
block.meld2-aspect-discharger.details = ...alchemy magic bubllshit

block.meld2-aether-vitrifier.name = Aether Vitrifier
block.meld2-aether-vitrifier.description = Grows Dissonitre with [#cbdbfc]Aether[] over [accent]aspect soil[] using [accent]power[].
block.meld2-aether-vitrifier.details = ...less alchemy bullshit

block.meld2-aether-cracker.name = Aether Cracker
block.meld2-aether-cracker.description = Cracks [#cb8650]Aether[] into [#8872da]Rift[] over [accent]ichor vents[]. Siphons some [#e6c700]Ichor[] in the process. Shares [#cb8650]Aether[] out the sides. \n\n[accent]Excess fluids are released to avoid overpressurizing [red]including input [#cb8650]Aether[]![].[]

block.meld2-vitric-stimulator-ruined.name = Vitric Stimu1ator [lightgray](Ruined)[]
block.meld2-vitric-stimulator.description = Harvests [#8872da]Rift[] from suitable sources using Vitric Meshes to filter the air, producing a small amount of glass waste.\n\nRequires Power to run.\n\n[orange]Inefficient, deconstruction is advised[]
block.meld2-vitric-stimulator.details = If only those vents could be harvested from...

block.meld2-flarestack-filter.name = Flarestack Filter
block.meld2-flarestack-filter.description = Harvests [#8872da]Rift[] from suitable sources by neutralizing the impurities from the air.\n\nRequires Resonarum and Riplom to run.
block.meld2-flarestack-filter.details = Neutralizes the Aether content of an impure [accent]rift vent[] by focusing it into Aspect and combusting it with Riplom, but requires a constant supply of lenses to function.

block.meld2-filtrative-feeder.name = Filtrative Feeder
block.meld2-filtrative-feeder.description = Processes batches of [#e6c700]Ichor[] over [accent]meld floors[], aquiring some [#ea9ad6]Meld[] and pieces of Debris each batch processed.\n\nRequires a tiny trickle of power.\n\n[accent]Input liquid requirements based on efficiency.
block.meld2-filtrative-feeder.details = If you can't beat em...

block.meld2-siphon.name = Siphon
block.meld2-siphon.description = Pumps [#89828c]Mercury[] fluid deposits at [accent]half pressure[]. Uses Compacted Bricks/Stony Gloop to repair stability. \n\nStability is [red]limited[] and deposits will break open if exhausted! \n\n[gray]Deposit repairing is a WIP and will only be added if there's enough of a need.

block.meld2-sap-extractor.name = Sap Extractor
block.meld2-sap-extractor.description = Extracts [#b89f47]Nectar[] from suitable sources. Needs to be attached to a [#BE7E60]Mangrove Heart[] or a [accent]Nectar Fissure[] over Nectar or Mercury floors.

block.meld2-displacement-pump.name = Displacement Pump
block.meld2-displacement-pump.description = Dumps Debris into fluids to retrive a steady supply of fluid indefinitely. Requires [#cbdbfc]Aspect[] to run.\n\n[accent]Plated[]

block.meld2-elemental-blaster.name = Elemental Blaster
block.meld2-elemental-blaster.description = Blasts deposits for items indefinitely. Requires [#cbdbfc]Aspect[] to run.\n\nCan be boosted with [#ea9ad6]Meld[] to double harvesting speed.

block.meld2-grinder-quarry.name = Grinder Quarry
block.meld2-grinder-quarry.description = Rips up the land it's placed on, and harvests from ore deposits indefinitely.\n\nRequires [#cbdbfc]Aspect[] to run.\n\n[accent]Connects to adjacent Depots![]\n\nPipe in [accent]explosives[], [accent]stronger fuels[], [accent]grinding particulate[], or [accent]solvents[], to rip up the ground faster, or increase its yield.

block.meld2-pneumatic-pulsar.name = Pneumatic Pulsar
block.meld2-pneumatic-pulsar.description = Blasts a single deposit for items indefinitely while maintained. Requires [#cb8650]Aether[] to run.\n\n[red]Explosions damage everything around them, high maintenance![]

block.meld2-elemental-sampler.name = Elemental Sampler
block.meld2-elemental-sampler.description = Samples deposits for items indefinitely. Requires [#cbdbfc]Aspect[] and [#8872da]Rift[] to run.\n\nCan be boosted with [#b460e2]Warp[] to double harvesting speed.\n\n[accent]More efficient against soft tissue[]
block.meld2-elemental-sampler.details = It wants to return home.

block.meld2-harbinger-of-decay.name = Harbinger of Decay
block.meld2-harbinger-of-decay.description = Channels meld from pools into itself.
block.meld2-harbinger-of-decay.details = Somebody wants their shot of resonarum, hehehe~

block.meld2-elemental-blaster.details = Developed late into the incursion. Previous mining methods were subject to failure at the whims of mechanical parts corroding.

block.meld2-techno-dredger.name = Techno Dredger
block.meld2-techno-dredger.description = Collects massive amounts of lose pieces of technoscrap. Requires [#cbdbfc]Aspect[] to run.

block.meld2-earthen-grinder.name = Earthen Grinder
block.meld2-earthen-grinder.description = Crushes up earthen stone and mixes it with [#b89f47]Nectar[] & [#8872da]Rift[] to make Stony Gloop.


block.meld2-elemental-folder.name = Electrum Folder
block.meld2-electrum-folder.description = Purifies, and folds native electrum deposits into sheets. Able to process deposits poisoned by [#89828c]Mercury[].\n\nRequires [#cbdbfc]Aspect[] to run.

block.meld2-pad-omega.name = Pad: Trench
block.meld2-pad-omega.description = Outpost of the base. Only one can be active at a time.\n[red]Cannot support a base alone.[]
block.meld2-pad-omega.details = A callback to the good ol' days

block.meld2-pad-psi.name = Pad: Psi
block.meld2-pad-psi.description = Outpost of the base. Only one can be active at a time.\n[red]Cannot support a base alone.[]
block.meld2-pad-psi.details = Lasor.

block.meld2-pad-phi.name = Pad: Phi
block.meld2-pad-phi.description = Outpost of the base. Only one can be active at a time.\n[red]Cannot support a base alone.[]
block.meld2-pad-phi.details = Golden ratio? What's that?

block.meld2-aspect-incinerator.name = Aspect Incinerator
block.meld2-aspect-incinerator.description = Incinerates items when fed [meld2-aspect]Aspect[].\n\nBuffers items otherwise.
block.meld2-aspect-incinerator.details = Shoulda been named output terminal or smthing

block.meld2-core-raft-dormant.name = Core: Raft[lightgray](Dormant)[]
block.meld2-core-raft-dormant.description = Core of the base. Allows units to pass through freely. [accent]Activates when inside a powered facility.[]
block.meld2-core-raft-dormant.details = Cheap bunker with intra-sector item transport and radar built in.

block.meld2-core-raft.name = Core: Raft
block.meld2-core-raft.description = Core of the base. Allows units to pass through freely. Once all are destroyed, the sector is lost.\n\n[accent]Requires an adjacent incinerator to void excess items.[]
block.meld2-core-raft.details = A great logistics hub. Equipped with single-use launch thrusters.

block.meld2-core-bunker.name = Core: Bunker
block.meld2-core-bunker.description = Core of the base. Allows units to pass through freely. Once all are destroyed, the sector is lost.
block.meld2-core-bunker.details = A great logistics hub. Equipped with single-use launch thrusters.

block.meld2-buffer.name = Buffer
block.meld2-buffer.description = Stores a small amount of items with separate capacities per type. Can be unloaded to empty its contents.\n\n[accent]Connects to the core![]\n\n[accent]Lightly Armored![]

block.meld2-depot.name = Depot
block.meld2-depot.description = Stores a small amount of items with separate capacities per type.\n\nOutputs its contents to adjacent blocks, can be configured to only output one type of item.

block.meld2-interface.name = Interface
block.meld2-interface.description = Stores a small amount of items with separate capacities per type. Can be unloaded to empty its contents. Can connect to the core!\n\nGround units can walk over this.

block.meld2-launch-station.name = Launch Station
block.meld2-launch-station.description = Pulls units in, and propels them in the target direction.\n\nFueled by [meld2-aspect]Aspect[].
block.meld2-launch-station.details = The beta version of the launch station was developed into something useful for kart racing, while the version chosen for deployment was refined to be highly consistent (inconsistently).

block.meld2-logistic-docks.name = Logistic Docks
block.meld2-logistic-docks.description = Attempts to set nearby unit's items to a certain threshold, using adjacent buildings as storage.
block.meld2-logistic-docks.details = Is this some type of florafest?\n\nNo mate, it's trains.\n\nooh

block.meld2-friction-pad.name = Friction Pad
block.meld2-friction-pad.description = Increases the drag of units, and removes the boost from Launch Stations.\n\nCan only be placed on shallow liquids, always replaced by other buildings.
block.meld2-friction-pad.details = Drifting? More like a floormat.

block.meld2-shark-factory.name = Shark Autoforge
block.meld2-shark-factory.description = Pumps out Shark units using Silver and Carbolith.\n\nRequires a large amount of [#cbdbfc]Aspect[] to run, getting quicker corosponding to the supply.

block.meld2-remora-factory.name = Remora Autoforge
block.meld2-remora-factory.description = Pumps out Remora units using Debris, Electrum and Vitric Mesh.\n\nRequires a large amount of [#cbdbfc]Aspect[] to run, getting quicker corosponding to the supply.

block.meld2-narwhal-factory.name = Narwhal Autoforge
block.meld2-narwhal-factory.description = Pumps out Narwhal units using Carbolith, Compacted Bricks and Stony Gloop.\n\nRequires a sizeable amount of [#cbdbfc]Aspect[] and [#e6c700]Ichor[] to run, getting quicker corosponding to the supply.\n\n[accent]Lightly Armored[]

block.meld2-hammerhead-factory.name = Hammerhead Bioforge
block.meld2-hammerhead-factory.description = Rapidly Gestates Hammerhead units using Debris, Riplom and Resonarum.\n\nRequires a sizeable amount of [#8872da]Rift[] and a trickle of [#cbdbfc]Aspect[] to run, getting quicker corosponding to the supply.

block.meld2-astrea-factory.name = Astrea Autoforge
block.meld2-astrea-factory.description = Pumps out Astrea units using Debris and Electrum.\n\nRequires a sizeable amount of [#cbdbfc]Aspect[] and [#89828c]Mercury[] to run, getting quicker corosponding to the supply.

//Manggrove blocks
block.meld2-swamp-root-heart.name = [#BE7E60]Mangrove Heart[]
block.meld2-swamp-root-heart.description = Harvestable for [#b89f47]Nectar[]. Never changes form.\n\n[red]Can't be deconstructed.\n\nMust be targeted directly to be attacked![]

block.meld2-swamp-root-dormant.name = [#BE7E60]Mangrove Root (Dormant)[]
block.meld2-swamp-root-dormant.description = Can [#89828c]blossom[] or [#4181B9]sprout leaves[]. Increases the global swamp unit capacity.\n\n[red]Can't be deconstructed.\n\nMust be targeted directly to be attacked![]

block.meld2-swamp-mangrove-large.name = [#BE7E60]Mangrove Effigy[]
block.meld2-swamp-mangrove-large.description = Acts as a hub for resources in the swamp.

block.meld2-swamp-mangrove-large-awake.name = [#4181B9]Awakened Mangrove Effigy[]
block.meld2-swamp-mangrove-large-awake.description = Acts as a hub for resources in the swamp. Spreads blood through silt.

block.meld2-swamp-plant-thorn-crawler.name = [#89828c]Thorn[] [#BE7E60]Crawler[]
block.meld2-swamp-plant-thorn-crawler.description = Fires off 2 bursts of needles in 3 directions. Bursts into a pool of [#b89f47]Nectar[] and drops of [#89413e]Ooze[] upon destruction.

//Meld blocks

block.meld2-meld-node.name = Meld Node
block.meld2-meld-node.description = Keeps the surounding swampland frozen. Spawnpoint for [#ea9ad6]Meld[] creatures during waves.

block.meld2-meld-surpressor.name = Meld Surpressor
block.meld2-meld-surpressor.description = Keeps the surounding swampland frozen. Constructed on top of core zones. Spawnpoint for [#ea9ad6]Meld[] creatures during waves.\n\n[red]Armored[]

block.meld2-meld-synapse.name = Meld Synapse
block.meld2-meld-synapse.description = Stabalizes surounding crystal barriers. Once no synapses remain, the entire wall crumbles.

block.meld2-meld-capsule.name = Meld Capsule
block.meld2-meld-capsule.description = Projects a barrier against physical attacks. Requires gasseous [#ea9ad6]Meld[] to run.

block.meld2-meld-amplifier.name = Meld Amplifier
block.meld2-meld-amplifier.description = Pulses [#ea9ad6]Amplification[] to all allies in range.

block.meld2-meld-beacon.name = Meld Beacon
block.meld2-meld-beacon.description = Fumigates areas with [#ea9ad6]Meld[] making nearby constructs very durable, while constantly chipping away at enemy targets within the cloud.
block.meld2-meld-beacon.details = Often seen near debris fields still being processed.

block.meld2-pipeline.name = Pipeline
block.meld2-pipeline.description = Meld construct which acts as a pipe.

block.meld2-pipeline-router.name = Pipeline Router
block.meld2-pipeline-router.description = Meld construct which acts as a fluid router..

block.meld2-pipeline-overpass.name = Pipeline Overpass
block.meld2-pipeline-overpass.description = Meld construct which acts as a bridge

block.meld2-pipeline-crossing.name = Pipeline Crossing
block.meld2-pipeline-crossing.description = Meld construct which acts as a fluid junction.

block.meld2-blocker.name = Crystal Barrier
block.meld2-blocker.description = Nigh indestructable crystaline formation of [#ea9ad6]Meld[]. Often demolished as a result of a broken Synapse, or from the floor melting underneath.\n\n[red]Heavly armored[]

block.meld2-blocker-large.name = Large Crystal Barrier
block.meld2-blocker-large.description = Nigh indestructable crystaline formation of [#ea9ad6]Meld[]. Often demolished as a result of a broken Synapse, or from the floor melting underneath.\n\n[red]Heavly armored[]

block.meld2-stone-blocker.name = Carbonic Barrier
block.meld2-stone-blocker.description = Artificial formation of [accent]Carbon Stone[]. Often demolished as a result of a broken Synapse, or from sustained firepower.\n\n[red]Heavly armored[]

block.meld2-stone-blocker-large.name = Large Carbonic Barrier
block.meld2-stone-blocker-large.description = Artificial formation of [accent]Carbon Stone[]. Often demolished as a result of a broken Synapse, or from sustained firepower.\n\n[red]Heavly armored[]

block.meld2-mallow-blocker.name = Mallow Barrier
block.meld2-mallow-blocker.description = Artificial formation of [accent]Mallow Sand[]. Often demolished as a result of a nearby explosion, or from sustained firepower.\n\n[red]Squishi! (60)[]

block.meld2-mallow-blocker-large.name = Large Mallow Barrier
block.meld2-mallow-blocker-large.description = Artificial formation of [accent]Mallow Sand[]. Often demolished as a result of a nearby explosion, or from sustained firepower.\n\n[red]Squishi! (60)[]

block.meld2-meld-cultivator.name = Meld Cultivator
block.meld2-meld-cultivator.description = Houses blobs which release gasseous [#ea9ad6]Meld[].

block.meld2-meld-pumpjack.name = Meld Pumpjack
block.meld2-meld-pumpjack.description = Harvests industrial quantities of [#e6c700]Ichor[].

block.meld2-aether-compressor.name = Aether Compressor
block.meld2-aether-compressor.description = Houses [#ea9ad6]Meld[] which compacts the surounding [#cb8650]Aether[] into the insides of the construct.

block.meld2-spawning-pool.name = Spawning Pool
block.meld2-spawning-pool.description = Uses massive amounts of [#e6c700]Ichor[] to incubate batches of larva.

block.meld2-jilla-incubator.name = Jilla Incubator
block.meld2-jilla-incubator.description = Entombs pairs of larvae in crystal inside [#cb8650]Aether[] environment to form Jilla constructs.\nBursts open into a Gilla and a pair of Killas when destroyed.
block.meld2-jilla-incubator.details = Not a suitable place to live...

block.meld2-craig-incubator.name = Craig Incubator
block.meld2-craig-incubator.description = Forms a metalic shell around larvae trios in an [#cb8650]Ichor[] environment to form Craig constructs. The residual stone is formed into an Afraig with each batch.\nBursts open into several Craigs and Afraigs when destroyed.\n\n[red]Lightly Armored[]
block.meld2-craig-incubator.details = Not the usual way to make Craigs, as often Blobs are made to posess the constructs.

block.meld2-gilla-incubator.name = Gilla Incubator
block.meld2-gilla-incubator.description = Entombs pairs of larvae in crystal inside [#cb8650]Aether[] environment to form Gilla constructs.\nBursts open into a Gilla and a pair of Killas when destroyed.
block.meld2-gilla-incubator.details = Not a suitable place to live...

block.meld2-meld-cluster-large.name = Large Meld Cluster
block.meld2-meld-cluster-large.description = A pile of [#ea9ad6]Meld[] which has overgrown an [#cb8650]Aether[] vent. Good source of starting debris.

block.meld2-craig-coffer.name = Craig Coffer
block.meld2-craig-coffer.description = Bursts open into Craigs upon destruction. Shoots nearby hostiles, taking damage in the process without Meld.

block.meld2-jilla-coffer.name = Jilla Coffer
block.meld2-jilla-coffer.description = Bursts open into Jilla upon destruction.

block.meld2-braig-coffer.name = Braig Coffer
block.meld2-braig-coffer.description = Bursts open into Braigs upon destruction. Locks onto a target's position, then fires a burst of rocks.

block.meld2-pointago-coffer.name = Pointago Coffer
block.meld2-pointago-coffer.description = Bursts open into multiple Pointago upon destruction. Locks onto a target's, then fires a 3 round burst of sharp rocks.

block.meld2-meld-cannon.name = Meld Cannon
block.meld2-meld-cannon.description = Lobs globs of [meld2-meld]Meld[] at enemies, suppressing them.

block.meld2-meld-spewer.name = Meld Spewer
block.meld2-meld-spewer.description = Sprays focused jets of [#e6c700]Ichor[] toward targets doing huge focused knockback, healing any allied building in the way.

block.meld2-tracker-encampment.name = Tracker Encampment
block.meld2-tracker-encampment.description = Launches off larvel missiles which do bonus damage on direct hit. Dislodges from its base when destroyed.\n\n[red]Heavly armored[]

block.meld2-scorcher-nest.name = Scorcher Nest
block.meld2-scorcher-nest.description = Crystalizes a scorcher crystal, which fuels 4 indipendantly targeted jets of flame. Bursts open into numerous Scorchers on destruction.

bloock.meld2-splurger-nset.name = Splurger Nest
bloock.meld2-splurger-nset.description = Fires off bundles of limited life Splurgers.
bloock.meld2-splurger-nset.details = Sploot

//Fringe blocks

block.meld2-aether-plug.name = Aether Plug
block.meld2-aether-plug.description = Siphons [#cb8650]Aether[] from suitable sources.

block.meld2-data-coagulator.name = Data Coagulator
block.meld2-data-coagulator.description = Scribes massive amounts of [#9ccaed]Liquid Data[] into sheets of Technoscrap to create Fragments.

block.meld2-rubble-refinery.name = Rubble Refinery
block.meld2-rubble-refinery.description = Blasts and centrifuges cracked industrial rubble for essential resources.\n\nRequires [#cbdbfc]Aspect[] to run.

block.meld2-metal-siev.name = Metal Sieve
block.meld2-metal-siev.description = Filters through cracked industrial rubble for Silver and Electrum, producing some starving masses in the process.\n\nRequires [#89828c]Mercury[] to run.

block.meld2-container.name = Container
block.meld2-container.description = Stores items with separate capacities per type.

block.meld2-crate.name = Crate
block.meld2-crate.description = Stores a small amount of items with separate capacities per type.
block.meld2-crate.details =  Often used as a locker substitute in industrial compounds.

block.meld2-drill-turret.name = Drill Turret
block.meld2-drill-turret.description = Focuses [#cbdbfc]Aspect[] into an armor piercing beam.

block.meld2-repair-turret.name = Repair Turret
block.meld2-repair-turret.description = Focuses [#cbdbfc]Aspect[] into repair packets.

block.meld2-shield-battery.name = Shield Battery
block.meld2-shield-battery.description = Spouts garbled [#9ccaed]Liquid Data[], often connected to Force Barrier walls. Requires [#cbdbfc]Aspect[] to run, and some starting [#9ccaed]Liquid Data[].
block.meld2-shield-battery.details = Infinite useless data.

block.meld2-access-point.name = Access Point
block.meld2-access-point.description = Plugs into an Encrypter to power it.
block.meld2-access-point.details = Im not sure how this works...

block.meld2-encrypter.name = Encrypter
block.meld2-encrypter.description = Harvests [accent]Fragments[] and [accent]Memory Shards[]. 
block.meld2-encrypter.details = No seriously, how does "encrypting" data give memory shards? Shoudn't it give Technoscrap?

block.meld2-data-miner.name = Data Miner
block.meld2-data-miner.description = Connects to exposed data cores, and mines small amounts of [#9ccaed]Liquid Data[]. 
block.meld2-data-miner.details = Also if Liquid Data is raw data then is encryption inserting liquid data into a medium or is it changing it somehow.

block.meld2-decryption-module.name = Decryption Module
block.meld2-decryption-module.description = Connects to exposed data cores, and rapidly pulls [#9ccaed]Liquid Data[] from [accent]Technoscrap[] using small amounts of [#9ccaed]Liquid Data[].
block.meld2-decryption-module.details = Seriously who thought of theese names???

block.meld2.data-coagulator.name = Data Coagulator
block.meld2-data-coagulator.description = Deposits mass amounts of data onto technoscrap. The process consumes excess technoscrap.
block.meld2-data-coagulator.details = Wait so if storage is Technoscrap which results in Fragments, then are memory shards like encrypted zip bombs?

block.meld2-indoctrinator.name = Indoctrinator
block.meld2-indoctrinator.description = Enlightens [accent]Technoscrap into [accent]Grating Chunks[]
block.meld2-indoctrinator.details = YOU LOSE MATERIAL DOING THIS???

//Parts

block.meld2-p-part-a0-0a-data-resonator.name = Data Resonator
block.meld2-p-part-a0-0a-data-resonator.description = Specialized fuel cell which provides power output to movement-based abilities.

block.meld2-p-part-a0-1a-targeting-matrix.name = Targeting Matrix
block.meld2-p-part-a0-1a-targeting-matrix.description = Holds a processor capable of more advanced targeting processes such as repairing allied structures or assisting in construction.

//environmental blocks

//storm planes

block.meld2-storm-dissonitre-cluster.name = Dissonitre Cluster
block.meld2-storm-dissonitre-cluster.description = Vitric cluster, glistens when infused with [#cb8650]Aether[]. Good source of Dissonitre. Regrows when lightning strikes.
block.meld2-storm-dissonitre-cluster.details = So uh... factory?

block.meld2-mallow-cluster-large.name = Large Mallow Cluster
block.meld2-mallow-cluster-large.description = Explodes when destroyed, spraying Dissonitre onto all nearby units.
block.meld2-mallow-cluster-large.details = So uh... factory?

//Resource blocks

block.meld2-debris-deposit.name = Debris Deposit
block.meld2-silver-deposit.name = Silver Deposit
block.meld2-electrum-deposit.name = Electrum Deposit
block.meld2-carbolith-deposit.name = Carbolith
block.meld2-resonarum-deposit.name = Resonarum Deposit
block.meld2-resonarum-outcrop.name = Resonarum Outcrop
block.meld2-earthen-wall-gloop.name = Stony Gloop
block.meld2-earthen-wall-fissure.name = Nectar Fissure
block.meld2-peat-mangrove-chunks.name = Elderflesh
block.meld2-peat-mangrove-chunks-planty.name = Compacted Masses
block.meld2-peat-mangrove-chunks-awoken.name = Blossoming Elderflesh

block.meld2-gale-wall.name = Gale Wall
block.meld2-gale-shale-wall.name = Gale Shale Wall
block.meld2-gale-shale.name = Gale Shale

block.meld2-resonant-stone-wall.name = Resonarum Stone Wall

//Items

item.meld2-debris.name = Debris
item.meld2-debris.description = Used in many kinds of constructs on Ikaru. Refineable.
item.meld2-debris.details = Broken down pieces of metal which the [#ea9ad6]Meld[] couldn't digest.

item.meld2-carbolith.name = Carbolith
item.meld2-carbolith.description = Used for structural support and as a fuel source.
item.meld2-carbolith.details = Carbon rich stone, not quite graphite. Different to the medication.

item.meld2-tenbris.name = Tenbris
item.meld2-tenbris.description = Raw material, valued for its ability to insulate aspect when refined.
item.meld2-tenbris.details = Fume infused hematite, more malleable and less brittle but less hard than usual.

item.meld2-motis.name = Motis
item.meld2-motis.description = Raw material, valued for its natural magnetism.
item.meld2-motis.details = Fume infused magnetite, more malleable and less brittle but less hard than usual.

item.meld2-shadesteel.name = Shadesteel
item.meld2-shadesteel.description = Not just some rock anymore.\nDurable building material.
item.meld2-shadesteel.details = IT'S NOT IRON I SWEAR

item.meld2-elnar-dust.name = Elnar Dust
item.meld2-elnar-dust.description = Raw material, valued for its ability to conduct aspect.
item.meld2-elnar-dust.details = Often found accumulating as specs in streams, which run through rich Elnar deposits.\n\nNative mineral to Ikaru, unknown composition. Likely aspect based...

item.meld2-compacted-brick.name = Compacted Bricks
item.meld2-compacted-brick.description = Used as a form of concrete for building foundations and power infastructure alongside Stony Gloop and Electrum Sheets.
item.meld2-compacted-brick.details = Bonk

item.meld2-stony-gloop.name = Stony Gloop
item.meld2-stony-gloop.description = Used as a motar for building foundations and power infastructure alongside Compacted Bricks and Electrum Sheets.
item.meld2-stony-gloop.details = Bloop

item.meld2-silver.name = Silver
item.meld2-silver.description = Used in electrical components and structures. Integral part in most basic units.
item.meld2-silver.details = Undigestable by the [#ea9ad6]Meld[].\n\nGreat capsule for [#cbdbfc]Aspect[].

item.meld2-annealed-silver.name = Annealed Silver
item.meld2-annealed-silver.description = Highly refined and attuned. Makes for a great aspect conductor.
item.meld2-annealed-silver.details = An easily made aspect superconductor.

item.meld2-iampsi.name = Iampsi
item.meld2-iampsi.description = Hardy mineral found accumulating in deposits under dried riverbeds, or as spikes above surface.\n\nDecomposable for Silver and Quartz Strata, useful for grinding.
item.meld2-iampsi.details = Radiance.

item.meld2-sandy-particulate.name = Sandy Particulate
item.meld2-sandy-particulate.description = Can't be mined by drill, crumbles too easily. Must be quarried.\n\nCan be filtered through for Quartz Strata.
item.meld2-sandy-particulate.details = Him.

item.meld2-quartz-strata.name = Quartz Strata
item.meld2-quartz-strata.description = Silicon oxide grains and crystals of various sizes, ready for industrial or military use.\n\nToo disorderly to be used in electronics raw.
item.meld2-quartz-strata.details = Me...

item.meld2-likestone-sediments.name = Likestone Sediments
item.meld2-likestone-sediments.description = Claystone deposited bessides old rivers. Acts as a great glass flux.
item.meld2-likestone-sediments.details = Family.

item.meld2-electrum-sheet.name = Electrum Sheet
item.meld2-electrum-sheet.description = Refined material used in power transmission and advanced unit production.
item.meld2-electrum-sheet.details = Also functions as a capsule for [#cbdbfc]Aspect[].

item.meld2-crucible-plating.name = Crucible Plating
item.meld2-crucible-plating.description = Versatile ceramic often used as an armor plating, or in the chambers of the more industrial high aspect appliances.\n\nMade from a variety of processing chains.
item.meld2-crucible-plating.details = Composition unknown.

item.meld2-aspect-pipe.name = Aspect Pipe
item.meld2-aspect-pipe.description = Insulated hull with a conductive core, used to transport aspects safely.\n\nMade from a variety of processing chains.
item.meld2-aspect-pipe.details = Looks like a swiss roll.\n\nWhat's a "swiss"?\n\nduno, probably like a word which good- a word which means good tasting\n\nWhat a silly word!\nnShould be replaced with delicious\n\nyeah but then it's too literally... literal with its name

item.meld2-vitric-mesh.name = Vitric Mesh
item.meld2-vitric-mesh.description = An intricate piece of glasswork which captures [#cb8650]Aether[] when stimulated with power, building on itself.
item.meld2-vitric-mesh.details = The design is of Meld origin, first being seen woven by constructs native to the Badlands. It is unknown what purpose they served.

item.meld2-shiny-globule.name = Shiny Globule
item.meld2-shiny-globule.description = Melted remains of glass hardened into shiny globules. Best disposed of safely, or recycled.
item.meld2-shiny-globule.details = Glassy remains of a once intricate craft.\n\nAn intresting natural phenomina. Seems to pulsate with a faint yet deep orange glow.

item.meld2-stormstruck-shell.name = Stormstruck Shell
item.meld2-stormstruck-shell.description = A crystalline weave of Dissonitre around a polished Resonarum clump.\nHighly unstable...
item.meld2-stormstruck-shell.details = An unatural abomination of two opposing forces, held together by some unknown force.

item.meld2-resonarum.name = Resonarum
item.meld2-resonarum.description = Used in high-energy [#cbdbfc]Aspect[] appliences such as [red]Nullifiers[].
item.meld2-resonarum.details = Pulsates with an erie green glow. Appears to passively mend itself.

item.meld2-dissonitre.name = Dissonitre
item.meld2-dissonitre.description = Rare alternative source of [#cb8650]Aether[] sourced from the Storm Planes and Badlands. Somewhat unstable.
item.meld2-dissonitre.details = Produces a distorted clicking sound.

item.meld2-clay-mallow.name = Clay-Mallow
item.meld2-clay-mallow.description = Clay from the Badlands. Easly moulded to form containers, but difficult to aquire by blasting soil.
item.meld2-clay-mallow.details = A delicate substance valued for its malleability and ability to keep its shape, along with its velvety texture.

item.meld2-glass-mallow.name = Glass-Mallow
item.meld2-glass-mallow.description = Refined clay from the Badlands, more glass than ceramic.
item.meld2-glass-mallow.details = A glossy, crystalline substance.

item.meld2-riplom.name = Riplom
item.meld2-riplom.description = Shale from the Storm Planes. A great flux for glasswork, though not much practical use found. Slightly volatile.
item.meld2-riplom.details = Looks almost fungal. Seems to absorb [#cbdbfc]Aspect[] from its suroundings.

item.meld2-riploko.name = Riploko
item.meld2-riploko.description = Riplom which has been infused with [#cbdbfc]Aspect[]. Ready to explode!
item.meld2-riploko.details = Oh no...

item.meld2-technoscrap.name = Technoscrap
item.meld2-technoscrap.description = Used in advanced storage logistics and basic Core blocks.
item.meld2-technoscrap.details = Used as a data storage medium. Has large amounts of data inscribed onto it at any given time.\nThere's data in the walls... Delicious!

item.meld2-grating-chunk.name = Grating Chunk
item.meld2-grating-chunk.description = No apparent use found. Panneling for the floors of the facilities which dot Ikaru.
item.meld2-grating-chunk.details = Despite the description made to imform you about what use you have for chunks, large swobs of chunks are used as the base of most of our structures. While database entries about this technology have been locked away from you, take detours from the path and find databanks. They will teach you how to produce and use theese chunks.

item.meld2-fragment.name = Fragment
item.meld2-fragment.description = Used to defragment the database to unlock new technology, and in advanced unit production.
item.meld2-fragment.details = Miscellaneous, disorganised pieces of data collected from the previous incursion. Often more useful than not.

item.meld2-memory-shard.name = Memory Shard
item.meld2-memory-shard.description = Used to defragment the database to unlock new technology, and in certain Liquid Data sources.
item.meld2-memory-shard.details = Rare pieecs of Technoscrap leaking organized [#9ccaed]Liquid Data[] into the sky. Appears to come from faulty databases, though the exact phenominon which unwravels technoscrap is still unknown.

item.meld2-bioscrap-graft.name = Bioscrap Graft
item.meld2-bioscrap-graft.description = Used to defragment the database to unlock new technology, and in certain regenerative appliences.
item.meld2-bioscrap-graft.details = Crafully assembled piece of technoscrap with some Earthen Soil and Aether packed in..\nThe first attempts at resonarum farming. While they did not prove to be useful on an indistrial scale, samples have found use instead in regenerative technology and data generation, propagating their use.

item.meld2-abberation-core.name = Abberation Core
item.meld2-abberation-core.description = Used to defragment the database to unlock new technology, and in certain Liquid Data slources.
item.meld2-abberation-core.details = Spouts random garbles of [#9ccaed]Liquid Data[] when energised. Quite the crude construct compared to other sources.

item.meld2-industrial-rubble.name = Industrial Rubble
item.meld2-industrial-rubble.description = Lucrative source of essential materials when cracked.\n[gray]Edible to the Meld.[]
item.meld2-industrial-rubble.details = Large clusters can be found primerally in containers next to debris. Better maintained containers may have more refined parts.

item.meld2-industrial-rubble-cracked.name = Industrial Rubble (Cracked)
item.meld2-industrial-rubble-cracked.description = Refinable for a slew of essential materials.
item.meld2-industrial-rubble-cracked.details = Corrosion resistant materials exposed after digestive processes and percussive damage.\nStrata recognises most miscalaneous items as cracked industrial rubble. Keep them out of the containers during evacuation!\n...Who's going t

item.meld2-astral-fulgurite.name = Astral Fulgurite
item.meld2-astral-fulgurite.description = Refineable for a slew of glassy materials.
item.meld2-astral-fulgurite.details = Looks like a weave of beutiful dissonitre glass with resonarum, wrapped around some Riplo shale.\n\nWho was this made by?

item.meld2-grazing-bar.name = Grazing Bar
item.meld2-grazing-bar.description = A bar of highly compacted dehydrated flora with a [#b89f47]Nectar[] center. Fragments easly with a loud cracking sound, but soft on the inside.
item.meld2-grazing-bar.details = I have no mouth and I must TASTE.

item.meld2-meld-shard.name = Meld Shard
item.meld2-meld-shard.description = Vague lifeform in crystal form. Use unknown.
item.meld2-meld-shard.details = DO NOT TAKE THIS HOME.\nWh-?\nNO.\nBut it's still frozen...\nLook- just put it in the chute and lets get out of here\nWhat chute?\nDo you know where "the chute" is?\nI- I don't actually. I thought you knew.\nI uh... wasn't told about a chute\nI was told there would be a chute when I was being shiped over\nYou're the one with the authority here, what do we do?\nYou shoudn't be telling me what t- oh. I... don't know.\nI want to see what happens when it melts. How it'll behave.\nIm done being screwed over, lets see...

item.meld2-larval-plating.name = Larval Plating
item.meld2-larval-plating.description = Some sort of juvinile plating piece. No uses found.
item.meld2-larval-plating.details = As the incursion continued, constructs were made from more modular pieces. Being able to meld together pieces of metal into building constructs via buildbeam was a huge breakthrough for the [#ea9ad6]Meld[].

item.meld2-larva.name = Larva
item.meld2-larva.description = Writhing metalic hunk with segments. Often seen in incubation structures that manufacture new constructs.

item.meld2-metalic-chunk.name = Metalic Chunk
item.meld2-metalic-chunk.description = Some sort of metalalic hunk. No uses found.\n[gray]Edible to the Meld.[]
item.meld2-metalic-chunk.details = Found on most mid-incursion constructs due to the sheer availability of non-native metal.

item.meld2-metalic-globule.name = Metalic Globule
item.meld2-metalic-globule.description = Some sort of metalalic blob. No uses found.
item.meld2-metalic-globule.details = Found on most pre-incursion constructs alongside Larval Plating. A conglomero of metals native to Ikaru.

item.meld2-stony-particulate.name = Stony Particulate
item.meld2-stony-particulate.description = Grains of carbon stone.
item.meld2-stony-particulate.details = Glued together by the [#ea9ad6]Meld[] using some unknown process.

item.meld2-aspect-bomb.name = Aspect Bomb
item.meld2-aspect-bomb.description = Intricate glasswork and silver capsule containing volatile [meld2-storming-aspect]Storming Aspect[].\n\nA primary high explosive usable both as an extremely potent ammo, and for use in industrial mining applications.\n\nPerfect to load into units for kamikaze runs.
item.meld2-aspect-bomb.details = Legends of the blue wolf roaming these lands once took an entire crystalline fortification down... with just aspect and pipes.

item.meld2-gunpowder.name = Gunpowder
item.meld2-gunpowder.description = A self oxidising, rapidly decomposing powder who's deflagration produces supersonic shockwaves.\n\nHighly useful in mining explosives, can be manufactured into many standardised ammo types.
item.meld2-gunpowder.details = Doesn't beat aspect bombing.

item.meld2-bramble-vine.name = Bramble Vine
item.meld2-bramble-vine.description = Thick biological strands coursing with [#89828c]Mercury[].\nContains trace amounts of [#89413e]Ooze[]

item.meld2-compacted-masses.name = Compacted Masses
item.meld2-compacted-masses.description = Cluster of biological material wrapped with [accent]Bramble Vines[].

item.meld2-starving-masses.name = Starving Masses
item.meld2-starving-masses.description = Shriveled up cluster of biological material. Acts as a great filtratium medium. The texture's quite dry.
item.meld2-starving-masses.details = Hey stop eating that, we don't know what it's mad-\nShut it, I've been locked in here for ages\nBut that doesn't mean you should eat that, it's probably starving\nFor what? The sludge they keep giving me to drink?\n...would you like to try that?

item.meld2-elderflesh.name = Elderflesh
item.meld2-elderflesh.description = Twisted biological strands coursing with [#b89f47]Nectar[].\nConstitutes the flora of the Mercury Swamps.

item.meld2-blossoming-elderflesh.name = Blossoming Elderflesh
item.meld2-blossoming-elderflesh.description = Puffballs of fine biological grains and slits intertwined with larger strands.\n[gray]Edible to the Meld.[]

item.meld2-coagulated-vigor.name = Coagulated Vigor
item.meld2-coagulated-vigor.description = An eternally burning daemon's flesh, constantly in a cancerous state. One must imagine Icarus happy.\n[gray]Edible to the Meld.[]

item.meld2-homunculus-chunk.name = Homunculus Chunk
item.meld2-homunculus-chunk.description = Chunks of... something?\nNot quite human.\n[gray]Edible to the Meld.[]

//Liquids

liquid.meld2-aether.name = [#cb8650]Aether
liquid.meld2-aether.description = Passively collected by certain structures. Found in abundance from [accent]aether vents[].
liquid.meld2-aether.details = Contains an abundance of primordial aspects.

liquid.meld2-aspect.name = [#cbdbfc]Aspect
liquid.meld2-aspect.description = Unstable alternative power source. Refinable.
liquid.meld2-aspect.details = Mixed primordial aspects.

liquid.meld2-fumes.name = [#5b4739]Fumes
liquid.meld2-fumes.description = Passively seeps into conductive materials. Used for a variety of metallurgic and restorative appliances.
liquid.meld2-fumes.details = Smoggy primordial aspects.

liquid.meld2-pollutant-mixture.name = [#cb8650][#6b4e4e]Pollutant Mix[]
liquid.meld2-pollutant-mixture.description = A mix of common aspects in the atmosphere of Ikaru. Emitted by [accent]aether vents[].\n\nCan be used in place of [#cb8650]Aether[]
liquid.meld2-pollutant-mixture.details = A mixture of secondary aspects.

liquid.meld2-thundering-aether.name = [#e98b66]Thundering Aether[]
liquid.meld2-thundering-aether.description = Cackles and crackles, an energy inbetween.\n\nCan be used in place of [#cb8650]Aether[]
liquid.meld2-thundering-aether.details = Crickling and crackling, cackling and cack- auegh... dammit\n\nwait, is this thing still on?\n\nFith... fith- sixed? nono... has t-[red]<RECORDING CUT>[]

liquid.meld2-bound-aspect.name = [#a451c8]Bound Aspect[]
liquid.meld2-bound-aspect.description = A highly energy dense, stable fuel.\n\nCan be used in place of [#cbdbfc]Aspect[]
liquid.meld2-bound-aspect.details = Confusing mixture of primordial aspects

liquid.meld2-storming-aspect.name = [#ffffff]Storming Aspect[]
liquid.meld2-storming-aspect.description = Sparks and flashes, dancing on the monitor.\n\nCan be used in place of [#cbdbfc]Aspect[]
liquid.meld2-storming-aspect.details = Hexing dance of primordial aspects

liquid.meld2-nectar.name = [#b89f47]Nectar
liquid.meld2-nectar.description = Used as a potent coolant. Can be refined into [#89828c]Mercury[] over high heat with the right reagents. Encourages a slight mending effect on units.
liquid.meld2-nectar.details = Blood of the swamp.

liquid.meld2-mercury.name = [#89828c]Mercury
liquid.meld2-mercury.description = Used as lubricant. Acts as a potent toxin inside creatures of [#ea9ad6]Meld[] origin.
liquid.meld2-mercury.details = The database gets a bit... dubious with autoanalysis of substances. Remeber to clarify what stats like heat capacity and temperature mean with any survivors.

liquid.meld2-blood.name = [#7d312f]Blood
liquid.meld2-blood.description = [gray]...\nwhat?[]
liquid.meld2-blood.details = Lifeforce of the swamp.\n\n[accent]Cycle[]

liquid.meld2-ooze.name = [#89413e]Ooze
liquid.meld2-ooze.description = No apparent use found. Cold to the touch.
liquid.meld2-ooze.details = Comprises most of the Mercury Swamp's terrain. Very dense, yet still quite runny.\n\n[accent]Decay[]

liquid.meld2-rift.name = [#8872da]Rift
liquid.meld2-rift.description = Refinable into [#b460e2]Warp[]. Released from [#cb8650]Aether[] fused with Carbolith under high heat.
liquid.meld2-rift.details = Jumbled primordial aspects.

liquid.meld2-warp.name = [#b460e2]Warp
liquid.meld2-warp.description = Used in utility buildings as fuel and in higher tier unit construction.\n\n[scarlet]Highly unstable[]

liquid.meld2-ichor.name = [#e6c700]Ichor
liquid.meld2-ichor.description = Major food source for the [#ea9ad6]Meld[]. Fuels [#ea9ad6]Meld[] construct birthing and a major component in sustainable power systems/mass-produced infastructure.

liquid.meld2-liquid-data.name = [#9ccaed]Liquid Data[]
liquid.meld2-liquid-data.description = Fluid form of data pulled from technoscrap and other related materials.
liquid.meld2-liquid-data.details = Appears to act as an alternative power source of sorts.

liquid.meld2-null.name = [red]Null
liquid.meld2-null.description = Byproduct of technoscrap cracking. Often vanishes without a trace.

liquid.meld2-meld.name = [#ea9ad6]Meld[]
liquid.meld2-meld.description = Slowly disolves most metals and organics, save for a group of materials.
liquid.meld2-meld.details = The original lifeform on Ikaru in gaseous state.

//Aspect Groups
aspect-group.meld2-aether = [meld2-aether]Aether
aspect-group.meld2-aspect = [meld2-aspect]Aspect
aspect-group.meld2-fumes = [meld2-fumes]Fumes
aspect-group.meld2-aqua = [#6fd37a]Aqua[]
aspect-group.meld2-outlet = Outlet Fuel

//Units

//Internal

unit.meld2-observer.name = Observer
unit.meld2-observer.description = Commander of the Dormant Raft core. Fields a large build radius and [accent]Rallies[] nearby allies. Cannot mine resources, and comes with a reduced build speed.
unit.meld2-observer.

//Strata units

unit.meld2-bulbhead.name = Bulbhead
unit.meld2-bulbhead.description = Commander of the Raft core. Shoots sonar pulses and [accent]Rallies[] nearby allies. Repairs allied structures. Can reconstitute itself using appropriate liquids, or with enough time.\n\nHovers over buildings and solid floors at a reduced speed.
unit.meld2-bulbhead.details = The classic.

unit.meld2-bulbhead-sonar.name = Bulbhead Overseer

unit.meld2-omega.name = Omega
unit.meld2-omega.description = Commander of the Omega pad. Launches canisters of shrapnel and [accent]Rallies[] nearby allies.\n\nHas a personal shield generator feeding into a force projector which gets faster at lower shield integrety. Can reconstitute itself using appropriate liquids.
unit.meld2-omega.details = The other classic.

unit.meld2-psi.name = Psi
unit.meld2-psi.description = Commander of the Psi pad. Charges up and fires beams of [#cbdbfc]Aspect[], doing [red]devistating[] damage, and [accent]Rallies[] nearby allies.\n\nHas a personal shield generator which gets faster at lower shield integrety. Can reconstitute itself using appropriate liquids.
unit.meld2-psi.details = ...you sure this will work?\n\nI've tested it before, how badly could this end?

unit.meld2-phi.name = Phi
unit.meld2-phi.description = Commander of the Phi pad. Launches armor-piercing spines which release ooze foam upon hitting the ground, and [accent]Rallies[] nearby allies.\n\nCan reconstitute itself using appropriate liquids, or with enough time.\n\n[accent]Lightly armored[]
unit.meld2-phi.details = ...you sure this will work?\n\nI've tested it before, how badly could this end?

unit.meld2-outcast.name = Outcast
unit.meld2-outcast.description = Old commander of the Bunker core. Drops whirling mines that sap health from targets hit.
unit.meld2-outcast.details = Not a classic. Still cool though.

unit.meld2-iguana.name = Iguana
unit.meld2-iguana.description = Commander of the Bunker core. Launches out sap vortexes which prime after a short delay. [accent]Rallies[] nearby allies. Quick omnidirectional movement.\n\n[accent]Plated[]
unit.meld2-iguana.details = One hell of an alien.

unit.meld2-shark.name = Shark
unit.meld2-shark.description = Launches salvos of missiles which sap target's health. Can hover on land at a reduced speed. An [accent]excellent[] scout.\n[red]Struggles against force fields.[]
unit.meld2-shark.details = Enables the other mechanized fish, especially Remora and Narwhal.

unit.meld2-narwhal.name = Narwhal
unit.meld2-narwhal.description = Launches short-ranged orbital strikes. Hovers over deep bodies of liquid. Charges an energy field channeled from its spike when moving quickly which bounces units away.\n\n[gray]If only there was some way to launch them as missiles...[]\n\n[accent]Plated[]


unit.meld2-reef.name = Reef
unit.meld2-reef.description = Mines deposits. Slowly regenerates health.

unit.meld2-bloodied-reef.name = Bloodied Reef
unit.meld2-bloodied-reef.description = ???

unit.meld2-forlorn-reef.name = Forlorn Reef
unit.meld2-forlorn-reef.description = ???

unit.meld2-shambling-reef.name = Shambling Reef
unit.meld2-shambling-reef.description = ???

unit.meld2-astrea.name = Astrea
unit.meld2-astrea.description = Launches armor-piercing spines at targets. Crawls over obstructions.
unit.meld2-astrea.details = Has a taste for carbonic barriers. It's up to you as to what to do about them.

unit.meld2-remora.name = Remora
unit.meld2-remora.description = Launches homing spears which sap target's health, pulling targets further back after traveling a certain distance.
unit.meld2-remora.details = Despite being abiotic, Remora help Sharks tank damage on the battlefield while Sharks provide intel on where enemies are. A symbiotic relationship for the two mechanized fish.

unit.meld2-hammerhead.name = Hammerhead [red](PS)[]
unit.meld2-hammerhead.description = Launches piercing shards at enemies, making them take more knockback from other sources. Slowly regenerates from combat.\n\nCan be affected by most helpful effects.\n\n[purple]Biological![]\n\n[red]PLACEHOLDER SPRITES[]

unit.meld2-dragonfly.name = Dragonfly
unit.meld2-dragonfly.description = Revs up a needle launcher when hovering in place.
unit.meld2-dragonfly.

//Fringe units

unit.meld2-enforcer.name = Enforcer
unit.meld2-enforcer.description = Commander of squads during the incursion. Launches sprays of pellets towards targets and missiles with heavy knockback. Can reconstitute itself using appropriate liquids.
unit.meld2-enforcer.details = General commander unit used alongside specialists during the incursion.

unit.meld2-impaler.name = Impaler
unit.meld2-impaler.description = Pierces targets with shrapnel blasts at short range. Deploys autoturrets from its thorax.\n\n[accent]Plated[]
unit.meld2-impaler.details = Designed during the incursion to aid with problems arising due to armored constructs. Not very good against larger targets.

unit.meld2-impaler-autoturret.name = Impaler Autoturret

unit.meld2-time-keeper.name = Time Keeper
unit.meld2-time-keeper.description = Lacerates targets with a spray of particulate resonarum. Slowly regenerates health over time. \n\n[accent]Lightly armored[]
unit.meld2-time-keeper.details = A heavy crowd control option. An expiriment with grafting resonarum which came to fruition.

unit.meld2-purifier.name = Purifier
unit.meld2-purifier.description = Drills through enemy structures and units alike. Can reconstitute itself using appropriate liquids.
unit.meld2-purifier.details = A model predating the incursion built with local materials.


//Meld units

unit.meld2-jilla.name = Jilla
unit.meld2-jilla.description = [#ea9ad6]First form worm/crystal bug[]\nStabalized crystal enables spurting flame indefinitely with no reprecussion.
unit.meld2-jilla.details = Oddly enough, Jilla are not observed to form legs in their maturity, resembling a worm more than a crystal bug. Jilla were thought to be patient zero for new crystal bug forms, though exploring deeper into the caves lead to the discovery of something else...

unit.meld2-billa.name = Billa
unit.meld2-billa.description = [#ea9ad6]Seccond form worm/crystal bug[]\nConstruct sprints fowards upon being awoken, carying a bifrucated head to spurts flame in three directions.\n\n[red]Heavly Armored![]
unit.meld2-billa.details = Billas are an anomaly among cavern crystal bugs, their anatomy resembling that of a coffer.\n\nWhilst Jilla have a stabalised crystal, Billa do not.

unit.meld2-scorcher.name = Scorcher
unit.meld2-scorcher.description = [#ea9ad6]Small swarmling crystal bug[]\nConstruct observed to take constant damage while spurting its flame.
unit.meld2-scorcher.details = Scorchers are likely the original crystal bug. Jillas are quick and often aggresive, while Scorchers are observed around their home, too fragile to venture outwards.

unit.meld2-gilla.name = Gilla
unit.meld2-gilla.description = [#ea9ad6]Second form crystal bug[]\nBulky form allows the construct to survive longer while spurting flame.

unit.meld2-killa-armored.name = Killa (Armored)
unit.meld2-killa-armored.description = [#ea9ad6]Second form crystal bug[]\nObserved to launch dissolving globules at hostile targets, being catapulted away from the threat. \n\n[red]Lightly armored[]
unit.meld2-killa-armored.details = Constantly weighed down by their shell, Killa are the only armored constructs known to use Resonarum.

unit.meld2-killa.name = Killa
unit.meld2-killa.description = [#ea9ad6]Second form boosting crystal bug[]\nThrusters enable quick movement and resistance to being swept back by wind.
unit.meld2-killa.details = Theese lil goobers have developed somewhat of a tolerance for Resonarum through being high off it their entire lives, and they're ready to use that insatiable addiction to bypass your defenses.\n\nHey, didn't I tell you to be profe-\n\nprofeshishishut up, can't I have a bit of fu-\n\nNO.\n\nJesus... double standards much.

unit.meld2-craig.name = Craig
unit.meld2-craig.description = [#ea9ad6]First form scrap heap[]\nLow durability and an unstable weapon, but often comes in swarms.
unit.meld2-craig.details = Composed of materials frequently found in [#e6c700]Ichor[].

unit.meld2-afraig.name = Afraig
unit.meld2-afraig.description = [#ea9ad6]First form nuisance scrap heap[]\nWhen splurging flame, the construct is pushed back causing minimal damage to the target.\n\n[red]Armored[]

unit.meld2-braig.name = Braig
unit.meld2-braig.description = [#ea9ad6]Second form artillery scrap heap[]\nThe construct stays at range to shoot, while being armed with a Craig's blaster.\n\nActs as a small seige engine, able to take cover in [#ea9ad6]Meld Capsules & Beacons[].

unit.meld2-poisag.name = Poisag
unit.meld2-poisag.description = [#ea9ad6]Second form shielding scrap heap[]\nObserved launching miniturized [#ea9ad6]Meld Capsules[], deploying on hit/near to units.\n\nDangerous when combined with constructs that can effectively use the protection, or when ammo is limited.\n\n[red]Lightly armored[]

unit.meld2-pointago.name = Pointago
unit.meld2-pointago.description = [#ea9ad6]Second form berserker scrap heap[]\nConstruct stays at range after shooting, but will often run fowards afterwards.\n\nConstruct is easily agitated when threatened, and has been observed to kamikaze into a defense after being damaged.

unit.meld2-graig.name = Graig
unit.meld2-graig.description = [#ea9ad6]Megalith nest scrap heap?[]\nObserved to birth Craigs en-masse. Armored with multiple of Braig's and Craig's weapons, the construct can defend itself well.\n\nTheorised to be a fragment off of a larger scrap heap.\n\n[red]Heavly armored[]

unit.meld2-wuba.name = Wuba
unit.meld2-wuba.description = [#ea9ad6]First form kamekaze worm[]\nWhen threatened or means of protecting its colony, the construct blasts off its shell and attempts to detonate.

unit.meld2-wuba-exploding.name = Wuba [red](Exploding!)[]
unit.meld2-wuba-exploding.description = A large, volatile blob, soon to detonate.\n\n[#ea9ad6]Blob![]
unit.meld2-wuba-exploding.details = It can think???

unit.meld2-uwubba.name = Uwubba
unit.meld2-uwubba.description = [#ea9ad6]First form kamekaze worm[]\nA wuba encased in a stony shell, not too different to an armored killa.\n\n[red]Heavly Armored![]
unit.meld2-uwubba.details = Yknow theres probably a joke to be made here.

unit.meld2-ontragga.name = Ontragga
unit.meld2-ontragga.description = [#ea9ad6]Second form seige worm[]\nConstruct creeps foward shielding numerous wuba inside from harm whilst sporting a heavy aether cannon which fires in three round bursts.\n\nThis construct is a [accent]high priority target[] and [red]must[] be taken out before it breaches a defensive perimeter, [red]DO NOT LET IT LEAK.[]\n\n[red]Plated![]\n\n[orange]Biomechanical![]
unit.meld2-ontragga.details = Yknow theres probably a joke to be made here.

unit.meld2-globkin.name = Globkin
unit.meld2-globkin.description = [#ea9ad6]Guardian skirmisher nest construct[]\n\nConstruct jolts backwards after launching a blast of shrapnel from its cannons, containing several blobs that detonate if not dealt with.\n\nDistract with moble units or drop overseer pings on it to prevent it from recoiling past defensive lines.\n\n[red]Plated![]

unit.meld2-allegro.name = Allegro
unit.meld2-allegro.description = [#ea9ad6]Guardian phalanx nest construct[]\nConstruct comes with a localised storm projector organ which bursts a cloud of vaporous meld periodically.\n\nReconstitutes all constructs in range and dissolves nearby enemy units with its spewers, recoiling backwards to stick in front of a defensive perimeter.\n\n[red]FOCUS FIRE AND DESTROY ON SIGHT.\nDO NOT GET ENGAGE IN CLOSE COMBAT.\nYOU HAVE BEEN WARNED[]

unit.meld2-impovrished.name = Impovrished
unit.meld2-impovrished.description = [#ea9ad6]Guardian battery nest construct[]\nConstruct is an amalgamation of common combat scrap heaps.\n\nOften hides behind other artillery units while using its cannons/snipers to provide fire support.\n\Scatters miniaturised [#ea9ad6]Meld Capsules[] from its tip.\n\n[red]Construct is a dangerous source of attrophy, engage in flanking manuvours and DESTROY on identification.[]\n\n[red]Plated!\n\n[orange]Biomechanical![]
unit.meld2-impovrished.details = A mock of a mock-\nan effegy of fraud, yet with real bite.

unit.meld2-tracker.name = Tracker
unit.meld2-tracker.description = [#ea9ad6]First form artillery support primitive scrap heap[]\n\nConstruct appears to be a mobile form of an incubator, who's sole purpose is to form projectiles and guide them towards targets.

unit.meld2-tracker-projectile.name = Tracker Projectile
unit.meld2-tracker-projectile.description = [#ea9ad6]Projectile construct[]\nConstruct is manufactured inside [accent]Tracker[] constructs and is directed towards its target through some unknown guidance mechanism.

unit.meld2-fletch.name = Fletch
unit.meld2-fletch.description = [#ea9ad6]First form hovercraft mimic[]\nThis construct appears to mimic [accent]Shark[] units? Im not sure what it's suposed to be other than that...
unit.meld2-fletch.details = Our test with "thrusters" is sucsessful. Blobslingers mounetd on a metal hull prove effective against invader's constructs, and Mercury will not prove problematic with steering handled asynchronously by crystals.

unit.meld2-kathid.name = Kathid
unit.meld2-kathid.description = [#ea9ad6]First form nestling crystal bug[]\nTheories about how [#ea9ad6]Meld[] forms colonies have circulated around since its discovery.\n\nOne theory is armored constructs like Kathids use their piercing flame to penetrate stone, like they do to metal. That wouldn't account for the giant rock formations spotted around.\n\n[red]Armored[]

unit.meld2-katika.name = Katika
unit.meld2-katika.description = [#ea9ad6]First form hydra crystal bug[]\nConstruct appears to be a malformed Kathid without a hardened shell with multiple heads, though there is little evidence to go off of.\n\nMaybe an error in creation propagated by its usefulness?\n\nDespite the appearence, the blob controlling the construct acts as one whole entity.
unit.meld2-katika.details = Theres some joke about evolution to be had here.

unit.meld2-kithlid.name = Kithlid
unit.meld2-kithlid.description = [#ea9ad6]Megalith nest crystal bug[]\nConstruct has been observed constantly pumping out [#ea9ad6]Jilla[] constructs in missile form when engaging threats.\n\nWhilst [#ea9ad6]Kithlid[] often turn quickly to face their targets, their ability to do so is hindered when charging up a barage of flame.\n\nEnsure that all parts of a Kithlid are thoughroughly dealt with after breaching the construct's shell.\n\n[red]Heavly armored[]

unit.meld2-pester.name = Pester
unit.meld2-pester.description = [#ea9ad6]Small sprayer flier[]\nBlasts targets with a burst of flame. Requires time to recharge.\nDamages units and buildings caught under its wake.

unit.meld2-spillway.name = Spillway
unit.meld2-spillway.description = [#ea9ad6]First form projectile carrier[]\nBirthed in its final form rather than being composed of multiple units, yet bursts open into [#ea9ad6]Craigs[] and [#ea9ad6]Wubbas.[].\n\nReffer to [accent]<Spillway Core>[] for more information on this construct's center.

unit.meld2-spillway-projectile.name = Spillway Core
unit.meld2-spillway-projectile.description = [#ea9ad6]Projectile construct[]\nWhile the core looks inconspicuous at first, two eye indents have been observed.\n\nIt is not certain if the core or the spillway controls the unit, but both burst into multiple constructs on destruction.

unit.meld2-gala.name = Gala
unit.meld2-gala.description = [#ea9ad6]Small blob carrier[]\nCaries blobs to wherever they're needed. Sometimes the construct will sacrifice itself, crashing down from the skies to release its blobs on hostiles.

unit.meld2-blob.name = Blob
unit.meld2-blob.description = [#ea9ad6]Blob![]\nA blob. What more is there to say?\n\nBlob blob blob blob blob.\n\n[#ea9ad6]Blob![]\n\nIt explodes after a delay, dealing massive damage.\n[gray]Don'y you remember what happened last time we got near one of tho-[][red]<RECORDING CUT>[]
unit.meld2-blob.details = You cut me off!\nJust like the blob did to our power yes yes, I know what happened last time...\nYou forgot to mention how theese are found on the weird structures this thing comes from\nThat'll have to wait for another entry then.

unit.meld2-splurger.name = Splurger
unit.meld2-splurger.description = [#ea9ad6]Tiny shelled blob[]\nThey gave the dam blobs armor, why the hell would you give it armor?\n\nIf this is some sort of prank like last time I swear ill-[red]<RECORDING CUT>[]\n\n [red]Plated![]
unit.meld2-splurger.details = You cut me off!\nJust like the blob did to our power yes yes, I know what happened last time...\nYou forgot to mention how theese are found on the weird structures this thing comes from\nThat'll have to wait for another entry then.

unit.meld2-zip.name = Zip
unit.meld2-zip.description = [#ea9ad6]Light spawner missile[]\nSpotted in swarms that flock between colonies. Beware the [#ea9ad6]Jilla[] they cary.

unit.meld2-inator.name = Inator
unit.meld2-inator.description = [#ea9ad6]First form skirmishing fulgarian[]\nConstruct is the first observed which has no visible forms of [#ea9ad6]Meld[] protrusions. Im not sure how it operates...\n\n[orange]Fully mechanical![]
unit.meld2-inator.details = The first mechanical unit truely added into the mod. There was an attempt with a flying unit before this, but it never made it past testing.

unit.meld2-stoner.name = Stoner
unit.meld2-stoner.description = [#ea9ad6]Bulky incindary artillery fulgurian[]\n\nConstruct needs to steady itself in place before unsheathing its weapon. I can't tell if it's impressive that it works or if it's concerning that it has a giant chunk of Dissonitre embedded into it.\n\n[orange]Fully mechanical![]
unit.meld2-stoner.details = Constantly stoned.

unit.meld2-bulwark.name = Bulwark
unit.meld2-bulwark.description = [#ea9ad6]First form shielding fulgurian[]\nConstruct has a small capsule construct encased in a layer of metal. I wonder how it's fueled...\n\n[red]Lightly armored[] & [orange] Mechanical!
unit.meld2-bulwark.details = An absolute mance to fight. Be prepared...

unit.meld2-soontm.name = Coming Soon!

//research categories

//Status effects

status.meld2-aspect-burn.name = Aspect Burn
status.meld2-aspect-burn.description = Doubles damage taken, does a tiny bit of DoT. Applied by [#cbdbfc]Aspect[]-based weaponary in conjunction with burning. \nOnly affects mechanical and armored targets.
status.meld2-aspect-burn

status.meld2-blackout.name = Blackout
status.meld2-blackout.description = Fade to nothing. Applied by the [gray]Backdrop[]
status.meld2-blackout.details = Being reshapen by the lucid one, much to the slumbering one's dismay.

status.meld2-dissolving.name = Dissolving
status.meld2-dissolving.description = Small bit of DoT and doubles damage taken. Applied by [#ea9ad6]Meld Beacons[].
status.meld2-dissolving.details = Being peeled appart by [#ea9ad6]Meld[], bit by bit.

status.meld2-strata.name = Strata
status.meld2-strata.description = Utilises Ikaru's basic resources to great effect.\n[accent]This is you![]
status.meld2-strata.details = Our last resort. If the Dreamer were to ever be lost, an instance of you would be awoken. Go forth and return what is ours.

status.meld2-fringe.name = Fringe
status.meld2-fringe.description = Enlightens materials into a useable form.
status.meld2-fringe.details = Hello Strata!

status.meld2-refreshed.name = Refreshed
status.meld2-refreshed.description = Doubles reload speed and slightly reduces damage taken. Invokes slight regeneration.

status.meld2-infested.name = Infested
status.meld2-infested.description = Hefty amount of DoT an' damage taken and dealt is magnified. Doubles... reload speed?\n\n[gray]What applies this again?\nI don't know, but we've got to ru-[]\n[red]<RECORDING CUT>[]

status.meld2-shattered-flame.name = Shattered Flame
status.meld2-shattered-flame.description = Sacrifice is power.

status.meld2-mercury-poisoning.name = Mercury Poisoning
status.meld2-mercury-poisoning.description = Extremely deadly to critters of [#ea9ad6]Meld[] origin. Effects unknown.\n[gray]TODO: Update this for Strata

status.meld2-slippery.name = Mercury Coating
status.meld2-slippery.description = Coating of [#89828c]Mercury[].\n[gray]Fun!\nHey don't eat that-[]

status.meld2-rally.name = Rally
status.meld2-rally.description = Increased mobility and reload. Applied by [accent]Commanders[] and [accent]Sonars[].

status.meld2-anchored.name = Anchored
status.meld2-anchored.description = Heavly increased drag and health. Heavly decreased speed. Applied by [accent]Movement Anchors[]

status.meld2-rebound.name = Rebound
status.meld2-rebound.description = Heavly increased speed, slightly increased reload speed. Decreased drag. Applied by [accent]Movement Anchors[]

status.meld2-amplified.name = Amplified
status.meld2-amplified.description = Amplifies mobility, durability and reload. Applied by [#ea9ad6]Meld Amplifiers[].

status.meld2-reconstitution.name = Reconstitution
status.meld2-reconstitution.description = Increases durability and drag. Slightly decreases speed. Light regeneration. Applied by [#ea9ad6]Meld Beacons[]. Certain constructs spawn with this.\nOnly affects biological targets.

status.meld2-sentry.name = Sentry
status.meld2-sentry.description = Heavily reduced mobility, but double fireate. Does constant DoT.\nCertain constructs apply this upon shooting.

status.meld2-surge.name = Surge
status.meld2-surge.description = Massive boost in reload speed, but heavly decreased damage.\nCertain constructs can intiate a surge with a long cooldown.

status.meld2-lacerated.name = Lacerated
status.meld2-lacerated.description = Heavly reduced mobility and fireate. Increases durability slightly and encourages light regeneration.\n\nApplied by [#4bb66b]Resonarum[] related sources. No effect on armored meld or inorganic targets.
status.meld2-lacerated.details = Applied recreationally by constructs which don't guard the nests. Maybe they have a different name for it?

status.meld2-shattered.name = Shattered
status.meld2-shattered.description = Doubles damage taken and reload speed. Increases damage and mobility.\n\nApplied by [#e89964]Dissonitre[] related sources. No effect on unarmored meld.
status.meld2-shattered.details = Applied frequently by certain constructs on the battlefield. Maybe they have a different name for it?

status.meld2-storm-a0-disabled.name = Shellshocked
status.meld2-storm-a0-disabled.description = Heavly reduced mobility and fireate. Applied by most sources of [#e45940]EMP[].

status.meld2-storm-a1-enabled.name = Storm Surge
status.meld2-storm-a1-enabled.description = Increased mobility, damage and reload. Applied by most sources of [#e45940]EMP[].

//Sectors

planet.meld2-ikaru.name = Ikaru
planet.meld2-ikaru.description = A wartorn planet with scraps of usable unrefined resources. Inhabited by the [#ea9ad6]Meld[].\n\nHeavy fog lingers everywhere.
planet.meld2-ikaru.details = The [#ea9ad6]Meld[] was always here. There was no beginning or end to life on Ikaru. from the planet's inception to its destruction, there will be always [#ea9ad6]Meld[].

//Texts
resurgence.text.dormant1 = This is a [accent]Dormant Core[].\n\nZoom out or pan over to the Trench core, hold [accent][CTRL][] and [accent]left click[] to respawn.
resurgence.text.dormant2 = This core lacks the power to spawn a [accent]Commander[].\nBringing it online requires [accent]Exploration.[]\n\nZoom out or pan over to the Trench core, hold [accent][CTRL][] and [accent]left click[] to respawn.

resurgence.text.barriers = [accent]Force barriers[] block the way...

resurgence.text.checkpoint1 = Additional [accent]Core Zones[] can\nbe used to move the pad and give vission.\n\nBuilding materials are [accent]plentiful\nBoth are gathered from [red]deconstruction[]
resurgence.text.checkpoint1end = The mechpad [accent]moves[] when [accent]placed in a new location.[]\nThe old pad is [red]destroyed[] in the process.
resurgence.text.checkpoint2 = [accent]Resource deposits[] suround this core zone.\n\nPlace a [accent]Trench[] pad here to move it.

resurgence.text.scavenge = There are numerous [accent]alcoves[] in this cave.\nScavenge their technology. Find a way out.
resurgence.text.liquids = [accent]Channels[] components can be used to help\n[accent]traverse ledges[] and [accent]deep liquid[].\n\nOpen your techtree and \uE875 Research the components.\nUse them to get through the crevice.

resurgence.text.leave = A [accent]Sector Databank[] has been activated.\n[accent]Locate the databank.[]\n\n[red]Leave the facility.[]
resurgence.text.turrets = The path is blocked...\n[accent]Turrets[] are the naval commander's only means of damage\nFigure out how to get past the debris.

resurgence.text.respawn = [accent]Respawn[] in the pad.
resurgence.text.respawn2 = [accent]Respawn in the active Raft Core.[]

//Objectives
objective.respawntrench = [accent]Respawn in the Trench pad[]
resurgence.exploredelve = [accent]Delve into the facility[]
resurgence.objective1 = [accent]Find a way out?[]
resurgence.objective2 = [accent]Exit the cave[]\n[lightgray](Somehow)[]
resurgence.objective3 = [accent]Find the databank[]
resurgence.intermission = [gray]???[]
resurgence.leaving = [accent]Abandon the sector[]\n[lightgray](Or keep exploring!)[]
resurgence.respawn2 = [accent]Respawn in the active Core.[]

//messages
resurgence.message.exit1 = ...There's no way out of the facility.
resurgence.message.exit2 = The exit is blocked, and the Omega isn't suited for oceanic traversal.\nBulbhead can't even get out...
resurgence.message.exit3 = Only one way out now.
resurgence.message.clear = [accent]BARRIERS CLEAR[]

notif.incubator5waves = [accent]Incubators awakening in 5 waves![]
notif.incubator2waves = [accent]Incubators awakening in 2 waves![]
notif.incubator1waves = [accent]Incubators awakening in 1 waves![]
notif.incubatorenabled = [red]Incubators have awoken![]

//Old campaign texts

creek.mine = Ikaru has plentiful scrap deposits.\nClick to mine [accent]Debris[] from floors.\n\nUse [accent][WASD] to move.[]
creek.deconstruct = [#ffff99b3]Debris is clogging the sources of [accent]Aether.[]\n[red]Deconstruct[] them by dragging [accent]RMB[] over them.\n(Or your bound deconstruction key)\nThis will give an abundance of Debris to build with
creek.destruction.text = [accent][red]Deconstruct[] the debris piles[]
creek.aether = [accent]Aether[] is the lifeblood of any base on Ikaru.\n\uE875 Research and place an [accent]Aether Accumulator[] on each vent.
creek.ores = \uE875 Research and place an [accent]elemental blaster[].\nThis automatically extracts resources from deposits.
creek.power = Production structures on Ikaru are fueled with [accent]Aspect[] via [accent]aspect outlets[].\nTransport [accent]Aether[] using [accent]Channel Faces and Nodes[]\nTransform [accent]Aether[] into [accent]Aspect[] next to the drills.\n\nMove debris into the core to continue.
creek.carbolith = Debris is insufficient to build turrets.\nMine the southern [accent]carbolith[] deposits.
creek.nodes = [accent]This is a [#ea9ad6]Meld Node[].\n\nYour core unit needs support to damage buildings.\n\uE875 Research and build a sunder turret to [red]destroy it[].
creek.zones = The node left behind a [accent]core zone[].\nConstruct a new Raft core to access the new area.\nHold [accent][CTRL][] and Click the new core to respawn.\n\n[accent]You may have to find electrum, search for something yellow![]
creek.zones.text = [accent]Cross the barrier[]
creek.silver = Units are required to seige the next [#ea9ad6]Meld Node[].\nFind a source of silver
creek.units = \uE875 Research and place a [accent] Sh1p Factory[].\n
creek.production = Product a [accent]Shark[]. Use the "?" button to see selected factory requirements.
creek.scouting = [accent]Shark[] units will be required to breach the next node's defenses.\nYou've done this on Erekir. Advance!
creek.barriers = [red]Crystal Barrier[]s are extremely durable.\nCircumvent them with [accent]Shark[] units.
creek.resonarum = This node had a [accent]resonarum[] deposit next to it.\nCollect the mineral.
creek.nullification = To destroy a [#ea9ad6]Meld Synapse[], a [red]Nullifier[] is required.\n\uE875 Research and place one in range.
creek.fuel = Fuel the [red]Nullifier[] with aspect.\n[red]Enjoy the aftermath.[]

scrapyard.carbolith = [accent]Carbolith[] deposits in this sector are [red]depleted[].\n\uE875 Research and build an [accent]Earthbound Infuser[] on the vent.
scrapyard.supply = Input [accent]Debris[] and [accent]Aspect[] into the infuser.\nIt will turn them into [accent]Carbolith[].\nRoute it back into the core.
scrapyard.wildlife = [#ea9ad6]Meld wildlife[] is [red]inbound[].\nPush out as far as possible with [accent]Shark[] units.\n[accent]You don't always need sunders![]
scrapyard.boost = This is a [#ea9ad6]Meld Amplifier[].\nIt buffs nearby [#ea9ad6]Meld wildlife[], and needs to be [red]NULLIFIED[] to be destroyed.\nAlternatively, its fuel can be cut. The Amplifier has a large reserve though!
scrapyard.armor1 = [red]Armored[] bugs incoming
scrapyard.armor2 = \uE875 Research and build [accent]Molotov[] turrets.
scrapyard.armor3 = [red]Armored enemies ariving![]
scrapyard.scouting = Find safe spaces to place molotovs away from the path.\n\nMake sure to spread them out!
scrapyard.tech = [lightgray]Communing with transponder...[]

hedge.scouting = Similar to Scrapyard, there are [red]no carbolith deposits![]\n\nFind silver, and get infusors running.\n\n[accent]Remember to prepare for armoured enemies![]
hedge.armorwarning = [red]Armored enemies coming from the north in 2 waves![]
hedge.armor = [red]Armored enemies ariving at the north![]

ruins.warning = [red]Spawning pools sighted!\nBe prepared.[]
ruins.pools1 = [accent]Spawning pools awaken in[]: [lightgray]{0}[]

ruins.vent = Tech [accent]Aether[] vents give 2x the aether!
ruins.tech = [accent]Technoscrap[] is required for [accent]Fragment[] processing.\n\uE875 Research and place a [accent]Techno Dredger[] on the remenants.
ruins.transport = Move the Technoscrap into the core to continue.
ruins.mining = [accent]Ruins[] hold valuable data. Glowing floor tiles are a source of [#9ccaed]Liquid Data[]!\n\uE875 Research and build a [accent]Data Miner[] to start.
ruins.decoding = [accent]Data Miners[] passively collect [#9ccaed]Liquid Data[].\nThe [accent]Decryption Module[] is required to produce an adiquate amount of [#9ccaed]Liquid Data[].\n[accent]You know the drill.[]
ruins.coagulation = A [accent]Data Coagulator[] is requierd to write the [#9ccaed]Liquid Data[] onto Technoscrap.\nThis will create [accent]Fragments[].
ruins.reminder = [accent]Fragments[] are required to research better technology.\nThe [#ea9ad6]Meld[] will back off once it senses you've completed your objective.\nUntil then, [red]survive the onslaught.[]
ruins.pool = This is a [#ea9ad6]Spawning Pool[].\nIt creates larva using [accent]Aether[], which the incubators to the sides grow into [#ea9ad6]Meld Wildlife[].\nTake it out!
ruins.scout = Pools unveil themselves from the [accent]Fog[] when activating.\nAlways check the minimap for pool locations after activation.\nUse [accent][M][] to open the minimap.

ruins.armorwarning = [red]Armored enemies ariving from the north east in 2 waves![]
ruins.armor = [red]Armored enemies ariving at the north east![]

ruins.armorwarning2 = [red]Armored enemies ariving from the south east in 2 waves![]
ruins.armor2 = [red]Armored enemies ariving at the south east![]

ruins.swarm = [red]A MASSIVE SWARM OF MELD IS ARIVING IN 5 WAVES![]

//New addition
tempest.starting = There is an [red]ensueing torrent[].\n\nMake sure you learn how to [#98ffa9]heal[] your units.
tempest.core-zone = Make sure you have the [accent]Electrum[] to build a new raft core!
tempest.respawn = As a reminder\nPress [accent][V][] near the core to respawn in it\n\nAlternatively, [accent][CTRL] + [LMB][] to respawn in the hovered core. 
tempest.enclosed = [accent]Astrea[] units can walk over buildings\n\n...though theres more than one way to bypass walls
tempest.synapse = Sometimes it's best to leave [#ea9ad6]Meld Synapses[] alive.\n\nThey serve as a good snack for damaged sharks.

tempest.stalling = [accent]The waves stall...[]
tempest.rushing = [scarlet]The [#ea9ad6]Meld[] rushes in![]
tempest.storm = The [red]storm[] has peaked.\nLook for [#b89f47]Nectar[] puddles around the map to [#98ffa9]heal[] [accent]Astrea[] units with.\nEnsure [accent]Shark[] units have something to snack on.\n\nIf you're unsure what a status effect does\ncheck your [accent]core database[].
tempest.nectar = Astreas can soak up [#b89f47]Nectar[] either\ndirectly from the ground or from puddles.

the-end.ending = Thank you for playing!\nYou have reached the end of the demo campaign :D\n\nMeld was originally a project I started to get back into Mindustry as a break from Frostscape.\n\nIt all started about a year ago in 2024 July...\n\nI did NOT expect it to grow into what it's become today!.\n\nI want to thank yalls for sticking with me, maybe star the repo if you've enjoyed the mod\n\nIm planning on porting the mod to Java, but this version will still be available.\n\nWhile yalls are waiting come and join the discord server\n...or maybe check out the custom game maps..

the-end.poem = For they had become the ones trapped\nassimilated into their home\nA hazy dream, still solidifying\nback to sleep they went

